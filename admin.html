<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Business Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- PWA Setup Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; color: #1e293b; padding-bottom: 50px; }
        
        #admin-login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f172a, #1e293b); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box h2 { margin: 0 0 10px; color: #0f172a; }
        .login-input-group { margin-bottom: 15px; text-align: left; }
        .login-input-group label { font-size: 12px; color: #475569; font-weight: 600; margin-bottom: 5px; display: block; }
        .login-box input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; font-family: 'Poppins'; }
        .btn-login { background: #0ea5e9; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .header { background: #0f172a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: 600; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dynamic-logo { height: 35px; border-radius: 5px; display: none; object-fit: contain; background: white; padding: 2px;} 
        .settings-btn { background: transparent; border: none; color: white; font-size: 20px; cursor: pointer; transition: transform 0.3s; }
        
        .dashboard { display: flex; gap: 15px; padding: 15px; }
        .stat-box { flex: 1; padding: 15px; border-radius: 12px; text-align: center; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer; transition: 0.3s; }
        .stat-box:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .stat-box:active { transform: scale(0.97); }
        
        .stat-sales { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .stat-profit { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-box h3 { margin: 0; font-size: 14px; font-weight: 600; opacity: 0.9;}
        .stat-box p { margin: 5px 0 0; font-size: 24px; font-weight: 800; }

        .form-container { background: white; padding: 20px; margin: 0 15px 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 4px solid #f59e0b; }
        .form-title { margin-top: 0; font-size: 18px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px; color: #b45309; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: #64748b; margin-bottom: 8px; font-weight: 500; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: 'Poppins'; outline: none; }
        .btn-reg { background: #f59e0b; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 5px; transition: 0.3s;}
        .btn-reg:active { transform: scale(0.98); }
        
        .seller-list-item { background: white; padding: 15px; margin: 0 15px 12px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.3s; }
        .seller-list-item:hover { background: #f8fafc; border-color: #cbd5e1; }
        .seller-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #e2e8f0; }
        .seller-list-left { display: flex; align-items: center; gap: 15px; flex: 1; }
        .seller-list-right { text-align: right; border-left: 1px dashed #e2e8f0; padding-left: 10px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px);}
        
        .profile-card { background: white; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; border-radius: 20px; text-align: center; padding-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideUp 0.3s ease-out;}
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .profile-header { background: linear-gradient(135deg, #f59e0b, #d97706); height: 80px; }
        .profile-img-large { width: 100px; height: 100px; border-radius: 50%; border: 5px solid white; object-fit: cover; margin-top: -50px; background: white; position: relative;}
        
        .seller-stats-box { background: #f8fafc; margin: 15px 20px; padding: 15px 0; border-radius: 10px; border: 1px solid #e2e8f0; display: flex; align-items: center; }
        .seller-stats-box div { flex: 1; text-align: center; }
        .seller-stats-box div:first-child { border-right: 1px solid #cbd5e1; }
        .seller-stats-box p { font-size: 11px; color: #64748b; margin: 0 0 5px; font-weight: 700; text-transform: uppercase; }
        .seller-stats-box h4 { margin: 0; font-size: 18px; }

        .detail-row { padding: 10px 20px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .detail-row label { font-size: 11px; color: #64748b; display: block; font-weight: 600; text-transform: uppercase; }
        .detail-row span { font-size: 14px; color: #1e293b; font-weight: 500; display: block;}
        
        .edit-input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 5px; font-family: 'Poppins'; display: none; margin-top: 5px; }
        .btn-action-group { display: flex; justify-content: center; gap: 10px; margin-top: 20px; padding: 0 20px; }
        .btn-edit-mode { background: #0ea5e9; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1;}
        .btn-save-mode { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1; display: none;}
        .btn-close-profile { background: #f1f5f9; color: #475569; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; flex: 1;}
        
        /* Delete Button Styles */
        .btn-delete-seller { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; width: calc(100% - 40px); margin: 15px auto 0; display: none; }

        .settings-card { background: white; width: 90%; max-width: 350px; border-radius: 15px; padding: 20px; text-align: left; }
        .btn-logout-red { background: #ef4444; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        .req-card { background:#f8fafc; padding:12px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #e2e8f0; }
        .req-card h4 { margin:0 0 3px; font-size:14px; color:#0f172a; }
        .req-card p { margin:0; font-size:11px; font-weight:600; }
    </style>
</head>
<body>

    <div id="admin-login-overlay">
        <div class="login-box">
            <h2>Admin Login</h2>
            <div class="login-input-group"><label>Admin Email</label><input type="email" id="adminEmail"></div>
            <div class="login-input-group"><label>Password</label><input type="password" id="adminPassword"></div>
            <button class="btn-login" onclick="loginAdmin()">Secure Login</button>
        </div>
    </div>

    <div id="main-admin-content" style="display: none;">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img class="dynamic-logo" id="headerLogo" src="" alt="Logo">
                <span>Admin Panel</span>
            </div>
            <button class="settings-btn" onclick="openSettingsModal()"><i class="fas fa-cog"></i></button>
        </div>

        <div class="dashboard">
            <div class="stat-box stat-sales" onclick="openGlobalHistoryModal()">
                <h3>Total Sales (All)</h3>
                <p id="total-sales">₹0</p>
            </div>
            <div class="stat-box stat-profit" onclick="openGlobalHistoryModal()">
                <h3>Total Profit</h3>
                <p id="total-profit">₹0</p>
            </div>
        </div>

        <div class="form-container" style="border-left: 4px solid #ef4444;">
            <h3 class="form-title" style="color: #b91c1c; display:flex; justify-content:space-between; align-items:center;">
                <span><i class="fas fa-shield-alt"></i> Permission Requests</span>
                <span id="reqBadge" style="background:#ef4444; color:white; font-size:10px; padding:2px 8px; border-radius:10px; display:none;">New</span>
            </h3>
            <div id="admin-requests-list">
                <p style="font-size:12px; color:#64748b;">No pending requests.</p>
            </div>
        </div>

        <div class="form-container" style="border-left: 4px solid #3b82f6;">
            <h3 class="form-title" style="color: #1d4ed8; display:flex; justify-content:space-between;">
                <span><i class="fas fa-history"></i> Seller Activities</span>
                <span id="actBadge" style="background:#3b82f6; color:white; font-size:10px; padding:2px 8px; border-radius:10px; display:none;">New</span>
            </h3>
            <div id="seller-activities-list"></div>
        </div>

        <div class="form-container">
            <h3 class="form-title"><i class="fas fa-user-plus"></i> Register Seller</h3>
            <div class="input-group"><input type="text" id="regStoreName" placeholder="Store Name"></div>
            <div class="input-group"><input type="text" id="regSellerName" placeholder="Seller Name"></div>
            <div class="input-group"><input type="date" id="regDob"></div>
            <div class="input-group"><input type="tel" id="regPhone" placeholder="Phone Number"></div>
            <div class="input-group"><textarea id="regAddress" placeholder="Full Address" rows="2"></textarea></div>
            
            <div class="input-group">
                <label style="color: #64748b; font-size: 12px; margin-bottom: 5px; display: block;">Profile Picture</label>
                <div style="display: flex; gap: 10px;">
                    <label style="flex: 1; background: #0ea5e9; color: white; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-camera"></i> Camera
                        <input type="file" accept="image/*" capture="environment" onchange="fileChosen(this)" style="display: none;">
                    </label>
                    <label style="flex: 1; background: #f59e0b; color: white; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-image"></i> Gallery
                        <input type="file" accept="image/*" onchange="fileChosen(this)" style="display: none;">
                    </label>
                </div>
                <p id="pic-status" style="font-size: 12px; color: #10b981; margin: 8px 0 0; text-align: center; font-weight: 600;"></p>
            </div>
            <button class="btn-reg" id="regBtn" onclick="registerSeller()">Create Account</button>
        </div>

        <h3 style="margin-left: 15px; font-size: 18px;">Sellers List</h3>
        <div id="sellers-list-container"></div>
    </div>

    <!-- Global Sales History Modal -->
    <div class="modal-overlay" id="globalHistoryModal">
        <div class="profile-card" style="text-align: left; padding: 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 15px;">
                <h3 style="margin:0; color:#0f172a; font-size: 18px;"><i class="fas fa-chart-line" style="color:#3b82f6;"></i> All Sales History</h3>
                <i class="fas fa-times" onclick="closeGlobalHistoryModal()" style="cursor: pointer; color: #64748b; font-size: 20px;"></i>
            </div>
            
            <div class="input-group">
                <select id="globalHistoryYear" onchange="fetchGlobalSalesHistory()" style="background:#f8fafc; font-weight:600; border:2px solid #cbd5e1;">
                    <option value="2026">Year: 2026</option>
                    <option value="2025">Year: 2025</option>
                    <option value="2024">Year: 2024</option>
                </select>
            </div>
            
            <div id="globalHistoryListContainer" style="max-height: 50vh; overflow-y: auto; padding-right: 5px; margin-top: 15px;">
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="settings-card">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #0f172a;"><i class="fas fa-cog"></i> Settings</h3>
                <i class="fas fa-times" style="cursor: pointer; color: #64748b; font-size: 18px;" onclick="closeSettingsModal()"></i>
            </div>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <p style="font-size: 12px; color: #64748b; margin: 0 0 5px;">Current Logo:</p>
                <img id="settingsLogoPreview" src="https://via.placeholder.com/150x50?text=No+Logo" style="max-height: 50px; max-width: 100%; border-radius: 5px; border: 1px solid #e2e8f0; padding: 5px;">
            </div>

            <div class="input-group">
                <label style="color: #059669; font-weight: 600;"><i class="fas fa-image"></i> Change Store Logo</label>
                <input type="file" accept="image/*" onchange="uploadLogoDB(this)" style="background: #f1f5f9; width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #cbd5e1;">
                <p id="logo-db-msg" style="color: #10b981; font-size: 12px; margin-top: 5px; font-weight: 600;"></p>
            </div>
            <div style="background: #f8fafc; padding: 12px; border-radius: 8px; margin-top: 20px; border: 1px solid #e2e8f0; text-align: center;">
                <p style="margin: 0; font-size: 12px; color: #64748b;">Logged in Admin:</p>
                <p id="admin-email-display" style="margin: 5px 0 0; font-size: 14px; font-weight: 600; color: #0f172a;"></p>
            </div>
            <button class="btn-logout-red" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Logout System</button>
        </div>
    </div>

    <!-- Seller Details Modal -->
    <div class="modal-overlay" id="sellerProfileModal" style="z-index: 1050;">
        <div class="profile-card">
            <div class="profile-header"></div>
            <div style="position: relative; display: inline-block;">
                <img id="profImg" class="profile-img-large" src="">
                <label id="editPicBtn" style="display: none; position: absolute; bottom: 0; right: 0; background: #0ea5e9; color: white; width: 30px; height: 30px; border-radius: 50%; text-align: center; line-height: 30px; cursor: pointer; border: 2px solid white;">
                    <i class="fas fa-camera" style="font-size: 12px;"></i>
                    <input type="file" accept="image/*" onchange="editProfilePicChosen(this)" style="display: none;">
                </label>
            </div>
            <p id="edit-pic-status" style="font-size: 11px; color: #10b981; margin: 0;"></p>

            <h3 id="profStore" style="margin: 15px 0 5px; color: #0f172a;"></h3>
            <input type="text" id="editStore" class="edit-input" style="width: 80%; margin: 0 auto 10px;">
            
            <!-- Contact Actions -->
            <div id="contactActions" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; margin-top: 10px;">
                <a id="btnCall" href="#" style="background: #10b981; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"><i class="fas fa-phone-alt"></i></a>
                <a id="btnWhatsApp" href="#" style="background: #25D366; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"><i class="fab fa-whatsapp"></i></a>
                <a id="btnSMS" href="#" style="background: #f59e0b; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);"><i class="fas fa-comment-dots"></i></a>
            </div>

            <div class="seller-stats-box" id="profStatsBox">
                <div><p>Total Sales</p><h4 id="profTotalSales" style="color: #0ea5e9;">₹0</h4></div>
                <div><p>Admin Profit</p><h4 id="profAdminProfit" style="color: #10b981;">₹0</h4></div>
            </div>

            <div class="detail-row"><label>Seller Name</label><span id="profName"></span><input type="text" id="editName" class="edit-input"></div>
            <div class="detail-row"><label>Phone Number</label><span id="profPhone"></span><input type="tel" id="editPhone" class="edit-input"></div>
            <div class="detail-row"><label>Address</label><span id="profAddress"></span><input type="text" id="editAddress" class="edit-input"></div>
            <div class="detail-row"><label>Date of Birth</label><span id="profDob"></span><input type="date" id="editDob" class="edit-input"></div>
            
            <div class="btn-action-group">
                <button class="btn-close-profile" onclick="closeProfileModal()">Close</button>
                <button class="btn-edit-mode" id="enableEditBtn" onclick="toggleEditMode(true)">Edit Info</button>
                <button class="btn-save-mode" id="saveEditBtn" onclick="saveSellerEdits()">Save Updates</button>
            </div>

            <!-- Delete Button (Visible Only in Edit Mode) -->
            <button class="btn-delete-seller" id="deleteSellerBtn" onclick="deleteSeller()"><i class="fas fa-trash-alt"></i> Delete Seller Account</button>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Registered'))
                .catch(err => console.log('PWA Failed', err));
            });
        }
    </script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCL4WsaX5utDOWw8V29m4Pyuliqyr81Qoo", authDomain: "a2z-store-58237.firebaseapp.com", projectId: "a2z-store-58237", storageBucket: "a2z-store-58237.firebasestorage.app", messagingSenderId: "489094614330", appId: "1:489094614330:web:adaa177f194b718f001403" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let globalSellerStats = {}; 
        let globalProductsMap = {};
        let globalHistoryList = [];
        let globalSellerDataMap = {}; 

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('admin-login-overlay').style.display = 'none';
                document.getElementById('main-admin-content').style.display = 'block';
                document.getElementById('admin-email-display').innerText = user.email;
                fetchLogoDB(); calculateStats(); fetchSellersDB(); 
                listenForPermissionRequests();
                listenForSellerActivities();
            } else {
                document.getElementById('admin-login-overlay').style.display = 'flex';
                document.getElementById('main-admin-content').style.display = 'none';
            }
        });

        function calculateStats() {
            db.collection("Products").onSnapshot(snap => {
                globalProductsMap = {};
                snap.forEach(doc => { globalProductsMap[doc.id] = doc.data(); });
                recalculateFromHistory();
            });

            db.collection("SalesHistory").onSnapshot(snap => {
                globalHistoryList = [];
                snap.forEach(doc => { globalHistoryList.push(doc.data()); });
                recalculateFromHistory();
            });
        }

        function recalculateFromHistory() {
            let totalS = 0, totalP = 0; let statsMap = {}; 
            
            globalHistoryList.forEach(h => {
                const sid = h.sellerId; const pid = h.productId;
                const salesAmt = h.totalAmount || (h.price * h.qty) || 0;
                let profitAmt = 0;
                
                if (h.adminProfit !== undefined) {
                    profitAmt = h.adminProfit;
                } else {
                    const prod = globalProductsMap[pid];
                    if (prod && prod.adminCommType && prod.adminCommValue !== undefined) {
                        if(prod.adminCommType === 'percent') profitAmt = (salesAmt * prod.adminCommValue) / 100;
                        else profitAmt = (prod.adminCommValue * h.qty) || 0;
                    } else {
                        profitAmt = salesAmt;
                    }
                }
                
                totalS += salesAmt; totalP += profitAmt;
                if(sid) {
                    if(!statsMap[sid]) statsMap[sid] = { sales: 0, profit: 0 };
                    statsMap[sid].sales += salesAmt; statsMap[sid].profit += profitAmt;
                }
            });
            
            document.getElementById('total-sales').innerText = "₹" + totalS.toFixed(0); 
            document.getElementById('total-profit').innerText = "₹" + totalP.toFixed(0); 
            globalSellerStats = statsMap;
            
            document.querySelectorAll('[id^="list_sales_"]').forEach(el => el.innerText = "0");
            document.querySelectorAll('[id^="list_profit_"]').forEach(el => el.innerText = "0");
            
            for(let sid in statsMap) { 
                const salesEl = document.getElementById('list_sales_' + sid); 
                const profitEl = document.getElementById('list_profit_' + sid); 
                if(salesEl) salesEl.innerText = statsMap[sid].sales.toFixed(0); 
                if(profitEl) profitEl.innerText = statsMap[sid].profit.toFixed(0); 
            }
            
            if(currentEditingSellerId && document.getElementById('sellerProfileModal').style.display === 'flex') {
                const st = statsMap[currentEditingSellerId] || { sales: 0, profit: 0 };
                document.getElementById('profTotalSales').innerText = "₹" + st.sales.toFixed(0);
                document.getElementById('profAdminProfit').innerText = "₹" + st.profit.toFixed(0);
            }
        }

        function openGlobalHistoryModal() {
            document.getElementById('globalHistoryModal').style.display = 'flex';
            document.getElementById('globalHistoryYear').value = new Date().getFullYear().toString();
            fetchGlobalSalesHistory();
        }

        function closeGlobalHistoryModal() { document.getElementById('globalHistoryModal').style.display = 'none'; }

        async function fetchGlobalSalesHistory() {
            const year = document.getElementById('globalHistoryYear').value;
            const container = document.getElementById('globalHistoryListContainer');
            container.innerHTML = `<div style="text-align:center; padding:20px; color:#3b82f6;"><i class="fas fa-spinner fa-spin"></i> Loading Global History...</div>`;

            try {
                const sellersSnap = await db.collection("Sellers").get();
                const sellerMap = {};
                sellersSnap.forEach(doc => { 
                    sellerMap[doc.id] = doc.data().storeName || doc.data().sellerName; 
                    if (!globalSellerDataMap[doc.id]) {
                        globalSellerDataMap[doc.id] = doc.data();
                    }
                });

                const historySnap = await db.collection("SalesHistory").where("year", "==", year).get();
                let historyData = [];
                historySnap.forEach(doc => { let d = doc.data(); d.id = doc.id; historyData.push(d); });

                historyData.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                    const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                    return timeB - timeA;
                });

                if(historyData.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:20px; color:#64748b; font-size:13px; background:#f1f5f9; border-radius:10px;">No sales recorded platform-wide in ${year}.</div>`;
                    return;
                }

                container.innerHTML = "";
                historyData.forEach(d => {
                    const date = d.timestamp ? d.timestamp.toDate().toLocaleDateString('en-IN') : "Just now";
                    const storeName = sellerMap[d.sellerId] || "Unknown Store";
                    const imgSource = d.productPic || 'https://via.placeholder.com/50';
                    
                    let buyerInfoHtml = '';
                    if(d.buyerName || d.buyerPhone) {
                        let nameDisp = d.buyerName || 'Customer';
                        let phoneDisp = d.buyerPhone ? ` | ${d.buyerPhone}` : '';
                        buyerInfoHtml = `<div style="background:#f8fafc; padding:8px 12px; border-radius:8px; margin-top:10px; font-size:11px; color:#475569; border:1px dashed #cbd5e1;"><i class="fas fa-user-circle" style="color:#0ea5e9;"></i> <strong>${nameDisp}</strong>${phoneDisp}</div>`;
                    }

                    container.innerHTML += `
                        <div style="background:white; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.02);">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px dashed #e2e8f0; padding-bottom:8px;">
                                <span onclick="openSellerProfileById('${d.sellerId}')" style="cursor:pointer; font-size:12px; font-weight:700; color:#b45309; background:#fffbeb; padding:4px 8px; border-radius:6px; transition:0.3s;"><i class="fas fa-store"></i> ${storeName}</span>
                                <span style="font-size:11px; color:#64748b; font-weight:600;"><i class="far fa-calendar-alt"></i> ${date}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div style="display:flex; align-items:center; gap:12px;">
                                    <img src="${imgSource}" style="width:45px; height:45px; border-radius:8px; object-fit:cover; border:1px solid #cbd5e1;">
                                    <div>
                                        <h4 style="margin:0 0 2px; font-size:14px; color:#0f172a;">${d.productName}</h4>
                                        <p style="margin:0; font-size:12px; color:#64748b; font-weight:600;">Qty: ${d.qty}</p>
                                    </div>
                                </div>
                                <div style="text-align:right;">
                                    <p style="margin:0; font-size:10px; color:#64748b; font-weight:700; text-transform:uppercase;">Amount</p>
                                    <h3 style="margin:0; font-size:18px; color:#10b981; font-weight:800;">₹${d.totalAmount}</h3>
                                </div>
                            </div>
                            ${buyerInfoHtml}
                        </div>
                    `;
                });
            } catch (err) { container.innerHTML = `<div style="color:red; text-align:center; font-size:12px; padding:10px;">Error: ${err.message}</div>`; }
        }

        window.openSellerProfileById = function(sid) {
            const d = globalSellerDataMap[sid];
            if(d) {
                openProfileModal(sid, d.storeName, d.sellerName, d.dob, d.profilePic, d.phone, d.address);
            } else {
                alert("Seller details not found!");
            }
        }

        function listenForPermissionRequests() {
            db.collection("AdminRequests").where("status", "==", "pending").onSnapshot(snap => {
                const cont = document.getElementById('admin-requests-list');
                const badge = document.getElementById('reqBadge');
                cont.innerHTML = "";
                if(snap.empty) { cont.innerHTML = "<p style='font-size:12px; color:#64748b;'>No pending requests.</p>"; badge.style.display = 'none'; return; }
                badge.style.display = 'inline-block'; badge.innerText = snap.size + " New";
                
                snap.forEach(doc => {
                    const d = doc.data();
                    let actionText = ""; let iconColor = "";
                    if(d.actionType === 'backup') { actionText = 'Request: Download Backup'; iconColor = '#0ea5e9'; }
                    else if(d.actionType === 'restore') { actionText = 'Request: Restore Data'; iconColor = '#10b981'; }
                    else if(d.actionType === 'delete_history') { actionText = 'Request: Delete History Record'; iconColor = '#ef4444'; }
                    
                    const time = d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : '';
                    cont.innerHTML += `
                        <div class="req-card">
                            <div style="flex:1;">
                                <h4>${d.sellerName}</h4>
                                <p style="color:${iconColor};">${actionText}</p>
                                <span style="font-size:9px; color:#94a3b8;">${time}</span>
                            </div>
                            <div style="display:flex; flex-direction:column; gap:5px;">
                                <button onclick="approveRequest('${doc.id}')" style="background:#10b981; color:white; border:none; padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer;">Approve</button>
                                <button onclick="rejectRequest('${doc.id}')" style="background:#fee2e2; color:#ef4444; border:1px solid #fecaca; padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer;">Reject</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        async function approveRequest(id) { await db.collection("AdminRequests").doc(id).update({ status: "approved" }); }
        async function rejectRequest(id) { await db.collection("AdminRequests").doc(id).delete(); }

        function listenForSellerActivities() {
            db.collection("SellerActivities").where("status", "==", "unread").orderBy("timestamp", "desc").onSnapshot(snap => {
                const cont = document.getElementById('seller-activities-list');
                const badge = document.getElementById('actBadge');
                cont.innerHTML = "";
                if(snap.empty) { cont.innerHTML = "<p style='font-size:12px; color:#64748b;'>No new activities.</p>"; badge.style.display = 'none'; return; }
                badge.style.display = 'inline-block'; badge.innerText = snap.size + " New";

                snap.forEach(doc => {
                    const d = doc.data();
                    const time = d.timestamp ? d.timestamp.toDate().toLocaleString() : '';
                    cont.innerHTML += `
                        <div class="req-card">
                            <div style="flex:1;">
                                <h4 style="color:#1d4ed8;">${d.sellerName}</h4>
                                <p style="color:#475569;">${d.activity}</p>
                                <span style="font-size:9px; color:#94a3b8;">${time}</span>
                            </div>
                            <button onclick="markActivityDone('${doc.id}')" style="background:#3b82f6; color:white; border:none; padding:6px 12px; border-radius:6px; font-size:11px; cursor:pointer;"><i class="fas fa-check"></i> Mark Complete</button>
                        </div>
                    `;
                });
            });
        }

        async function markActivityDone(id) { await db.collection("SellerActivities").doc(id).delete(); }

        function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettingsModal() { document.getElementById('settingsModal').style.display = 'none'; }
        async function loginAdmin() { const e = document.getElementById('adminEmail').value; const p = document.getElementById('adminPassword').value; try { await auth.signInWithEmailAndPassword(e, p); } catch (er) { alert("Error: " + er.message); } }
        function logoutAdmin() { auth.signOut(); closeSettingsModal(); }
        
        function processImage(file, width = 300) {
            return new Promise((resolve) => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = e => { const i = new Image(); i.src = e.target.result; i.onload = () => {
                    const c = document.createElement('canvas'); const s = width / i.width; c.width = width; c.height = i.height * s;
                    const ctx = c.getContext('2d'); ctx.drawImage(i, 0, 0, c.width, c.height); resolve(c.toDataURL('image/jpeg', 0.5));
                }; };
            });
        }
        async function uploadLogoDB(input) { if(!input.files[0]) return; document.getElementById('logo-db-msg').innerText = "Processing..."; const b = await processImage(input.files[0], 200); await db.collection("Settings").doc("StoreConfig").set({ logoUrl: b }, { merge: true }); document.getElementById('logo-db-msg').innerText = "✅ Logo Saved!"; }
        function fetchLogoDB() { db.collection("Settings").doc("StoreConfig").onSnapshot(doc => { if(doc.exists && doc.data().logoUrl) { const l = doc.data().logoUrl; document.getElementById('headerLogo').src = l; document.getElementById('headerLogo').style.display = 'block'; document.getElementById('settingsLogoPreview').src = l; } }); }
        
        let tempPic = null;
        async function fileChosen(input) { if(input.files[0]) { document.getElementById('pic-status').innerText = "Processing Image..."; tempPic = await processImage(input.files[0], 300); document.getElementById('pic-status').innerText = "✅ Image Ready"; } }
        
        async function registerSeller() {
            const sn = document.getElementById('regStoreName').value; const sln = document.getElementById('regSellerName').value; const dob = document.getElementById('regDob').value; const phone = document.getElementById('regPhone').value; const address = document.getElementById('regAddress').value;
            if(!sn || !sln || !dob) return alert("Fill Name, Store & DOB fields");
            document.getElementById('regBtn').disabled = true;
            try { await db.collection("Sellers").add({ storeName: sn, sellerName: sln, dob: dob, phone: phone, address: address, profilePic: tempPic || "", timestamp: firebase.firestore.FieldValue.serverTimestamp() }); alert("Seller Registered!"); location.reload(); } catch(e) { alert("Error: " + e.message); document.getElementById('regBtn').disabled = false; }
        }

        let currentEditingSellerId = null; let tempEditPic = null;
        function fetchSellersDB() {
            db.collection("Sellers").orderBy("timestamp", "desc").onSnapshot(snap => {
                const cont = document.getElementById('sellers-list-container'); cont.innerHTML = "";
                globalSellerDataMap = {}; 
                snap.forEach(doc => {
                    const d = doc.data(); const sid = doc.id; const stats = globalSellerStats[sid] || { sales: 0, profit: 0 };
                    globalSellerDataMap[sid] = d; 
                    const item = document.createElement('div'); item.className = 'seller-list-item';
                    item.innerHTML = `<div class="seller-list-left"><img src="${d.profilePic || 'https://via.placeholder.com/50'}" class="seller-avatar"><div><h4 style="margin:0; color:#0f172a;">${d.storeName}</h4><p style="margin:0; font-size:12px; color:#64748b;">${d.sellerName}</p></div></div><div class="seller-list-right"><div style="font-size:13px; font-weight:700; color:#0ea5e9;">₹<span id="list_sales_${sid}">${stats.sales.toFixed(0)}</span></div><div style="font-size:11px; font-weight:600; color:#10b981;">₹<span id="list_profit_${sid}">${stats.profit.toFixed(0)}</span></div></div>`;
                    item.onclick = () => openProfileModal(sid, d.storeName, d.sellerName, d.dob, d.profilePic, d.phone, d.address); cont.appendChild(item);
                });
            });
        }

        function openProfileModal(id, store, name, dob, pic, phone, address) {
            currentEditingSellerId = id; tempEditPic = pic;
            document.getElementById('profStore').innerText = store; document.getElementById('profName').innerText = name; document.getElementById('profDob').innerText = dob; document.getElementById('profPhone').innerText = phone || "N/A"; document.getElementById('profAddress').innerText = address || "N/A"; document.getElementById('profImg').src = pic || "https://via.placeholder.com/100";
            const stats = globalSellerStats[id] || { sales: 0, profit: 0 }; document.getElementById('profTotalSales').innerText = "₹" + stats.sales.toFixed(2); document.getElementById('profAdminProfit').innerText = "₹" + stats.profit.toFixed(2);
            document.getElementById('editStore').value = store; document.getElementById('editName').value = name; document.getElementById('editDob').value = dob; document.getElementById('editPhone').value = phone || ""; document.getElementById('editAddress').value = address || "";
            
            if (phone && phone !== "N/A") {
                document.getElementById('btnCall').href = "tel:" + phone;
                let waPhone = phone.startsWith('+') ? phone.replace('+', '') : "91" + phone;
                document.getElementById('btnWhatsApp').href = "https://wa.me/" + waPhone;
                document.getElementById('btnSMS').href = "sms:" + phone;
            }

            toggleEditMode(false); document.getElementById('sellerProfileModal').style.display = 'flex';
        }

        function closeProfileModal() { document.getElementById('sellerProfileModal').style.display = 'none'; }
        function toggleEditMode(isEditing) {
            const d = isEditing ? 'none' : 'block'; const i = isEditing ? 'block' : 'none';
            document.getElementById('profStore').style.display = d; document.getElementById('editStore').style.display = i; document.getElementById('profName').style.display = d; document.getElementById('editName').style.display = i; document.getElementById('profPhone').style.display = d; document.getElementById('editPhone').style.display = i; document.getElementById('profAddress').style.display = d; document.getElementById('editAddress').style.display = i; document.getElementById('profDob').style.display = d; document.getElementById('editDob').style.display = i; document.getElementById('profStatsBox').style.display = d; document.getElementById('enableEditBtn').style.display = d; document.getElementById('saveEditBtn').style.display = i; document.getElementById('editPicBtn').style.display = isEditing ? 'inline-block' : 'none'; document.getElementById('edit-pic-status').innerText = "";
            
            let rawPhone = document.getElementById('profPhone').innerText;
            document.getElementById('contactActions').style.display = (isEditing || !rawPhone || rawPhone === "N/A") ? 'none' : 'flex';
            
            // Show/Hide Delete Button
            document.getElementById('deleteSellerBtn').style.display = isEditing ? 'block' : 'none';
        }
        async function editProfilePicChosen(input) { if(input.files[0]) { document.getElementById('edit-pic-status').innerText = "Processing..."; tempEditPic = await processImage(input.files[0], 300); document.getElementById('profImg').src = tempEditPic; document.getElementById('edit-pic-status').innerText = "✅ Image Ready"; } }

        async function saveSellerEdits() {
            if(!currentEditingSellerId) return;
            const sn = document.getElementById('editStore').value; const sln = document.getElementById('editName').value; const dob = document.getElementById('editDob').value; const phone = document.getElementById('editPhone').value; const address = document.getElementById('editAddress').value;
            document.getElementById('saveEditBtn').innerText = "Saving..."; document.getElementById('saveEditBtn').disabled = true;
            try { await db.collection("Sellers").doc(currentEditingSellerId).update({ storeName: sn, sellerName: sln, dob: dob, phone: phone, address: address, profilePic: tempEditPic }); document.getElementById('saveEditBtn').innerText = "Saved!"; setTimeout(() => { closeProfileModal(); document.getElementById('saveEditBtn').innerText = "Save Updates"; document.getElementById('saveEditBtn').disabled = false; }, 1000); } catch(e) { alert("Error: " + e.message); document.getElementById('saveEditBtn').innerText = "Save Updates"; document.getElementById('saveEditBtn').disabled = false;}
        }

        // --- NEW: Delete Seller Function ---
        async function deleteSeller() {
            if(!currentEditingSellerId) return;
            const confirmDelete = confirm("Are you sure you want to delete this seller account? This action cannot be undone.");
            
            if(confirmDelete) {
                const btn = document.getElementById('deleteSellerBtn');
                btn.innerText = "Deleting...";
                btn.disabled = true;
                
                try {
                    await db.collection("Sellers").doc(currentEditingSellerId).delete();
                    alert("Seller deleted successfully.");
                    closeProfileModal();
                } catch(e) {
                    alert("Error deleting seller: " + e.message);
                } finally {
                    btn.innerHTML = '<i class="fas fa-trash-alt"></i> Delete Seller Account';
                    btn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
