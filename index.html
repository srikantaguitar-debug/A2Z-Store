<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2Z Online Store | Shopping App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; color: #1e293b; padding-bottom: 80px; }
        
        .header { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom-left-radius: 15px; border-bottom-right-radius: 15px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .dynamic-logo { height: 35px; width: 35px; border-radius: 50%; display: none; object-fit: cover; background: white; padding: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
        .header-title { font-size: 20px; font-weight: 800; color: white; margin: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        
        .info-btn { background: rgba(255,255,255,0.2); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-left: 5px; transition: 0.3s; }
        .info-btn:active { transform: scale(0.9); }

        .cart-icon { position: relative; font-size: 24px; color: white; cursor: pointer; transition: 0.3s; }
        .cart-icon:active { transform: scale(0.9); }
        .cart-badge { position: absolute; top: -6px; right: -8px; background: #ef4444; color: white; font-size: 11px; font-weight: 800; padding: 2px 7px; border-radius: 50px; border: 2px solid #8b5cf6; }

        /* Beautiful Sliding Notification Bar Fix */
.marquee-container { 
    background: #fee2e2; border-bottom: 1px solid #fecaca; 
    overflow: hidden; padding: 10px 0; display: none; width: 100%; white-space: nowrap; 
}
.marquee-text { 
    color: #b91c1c; font-size: 14px; font-weight: 700; 
    display: inline-block; animation: marqueeAnim 12s linear infinite; 
}
@keyframes marqueeAnim { 
    0% { transform: translateX(100vw); } 
    100% { transform: translateX(-100%); } 
}

        .search-container { padding: 15px 15px 10px; }
        .search-box { display: flex; align-items: center; background: white; padding: 12px 15px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .search-box i { color: #8b5cf6; margin-right: 10px; font-size: 16px; }
        .search-box input { border: none; background: transparent; width: 100%; outline: none; font-family: 'Poppins'; font-size: 14px; }

        .section-title { padding: 10px 15px 10px; font-size: 16px; font-weight: 800; color: #1e293b; margin: 0; display: flex; align-items: center; gap: 5px; }
        .hot-deals-container { display: flex; overflow-x: auto; padding: 5px 15px 15px; gap: 12px; scrollbar-width: none; }
        .hot-deals-container::-webkit-scrollbar { display: none; }
        .deal-item { width: 75px; min-width: 75px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.3s; }
        .deal-item:active { transform: scale(0.95); }
        .deal-img-box { width: 70px; height: 70px; border-radius: 15px; overflow: hidden; border: 2px solid #f59e0b; position: relative; margin-bottom: 5px; box-shadow: 0 4px 8px rgba(245, 158, 11, 0.3); background: white; }
        .deal-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .deal-discount-badge { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(239, 68, 68, 0.9); color: white; font-size: 10px; font-weight: 800; text-align: center; padding: 2px 0; }
        .deal-price { font-size: 13px; font-weight: 800; color: #0f172a; line-height: 1; }

        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px 20px; }
        .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; border: 1px solid #f1f5f9; transition: 0.3s; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .product-img-wrapper { position: relative; width: 100%; padding-top: 100%; background: #f8fafc; cursor: pointer; }
        .product-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .out-of-stock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; font-weight: 800; color: #ef4444; font-size: 15px; z-index: 10;}
        .product-details { padding: 12px; display: flex; flex-direction: column; flex: 1; cursor: pointer; }
        .store-badge { font-size: 10px; color: #8b5cf6; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; font-weight: 600; }
        .product-title { font-size: 14px; font-weight: 700; color: #0f172a; margin: 0 0 5px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .price-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;}
        .sell-price { font-size: 18px; font-weight: 800; color: #0f172a; }
        .mrp-price { font-size: 12px; color: #94a3b8; text-decoration: line-through; }
        .discount-tag { font-size: 11px; font-weight: 800; color: #16a34a; background: #dcfce7; padding: 2px 6px; border-radius: 5px;}
        
        .btn-group { display: flex; gap: 5px; margin-top: auto; }
        .btn-add-cart, .btn-buy-now { color: white; width: 100%; border: none; padding: 8px 5px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Poppins'; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s;}
        .btn-add-cart { background: #f59e0b; } .btn-add-cart:active { transform: scale(0.95); background: #d97706;}
        .btn-buy-now { background: #10b981; } .btn-buy-now:active { transform: scale(0.95); background: #059669;}
        .btn-disabled { background: #cbd5e1; color: #64748b; cursor: not-allowed; }

        .product-fs-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; flex-direction: column; animation: slideInRight 0.3s forwards; overflow-y: auto;}
        .fs-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 700; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; background: white; z-index: 10; }
        .fs-header i { cursor: pointer; color: #0f172a; font-size: 22px; }
        .fs-image-slider { display: flex; width: 100%; height: 55vh; background: #f8fafc; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; position: relative; scroll-behavior: smooth; }
.fs-image-slider::-webkit-scrollbar { display: none; }
.fs-image-wrapper { flex: 0 0 100%; height: 100%; display: flex; overflow: auto; scroll-snap-align: center; position: relative; }
.fs-product-img { margin: auto; max-width: 100%; max-height: 100%; object-fit: contain; transition: all 0.3s ease; cursor: zoom-in; }
.fs-product-img.zoomed { max-width: none; max-height: none; width: 250%; height: 250%; cursor: zoom-out; z-index: 50; }
.slide-indicator { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; pointer-events: none; z-index: 5;}
.zoom-hint { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.6); color: white; padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; pointer-events: none; z-index: 5;}
        .fs-details { padding: 20px; flex: 1; margin-bottom: 70px;}
        .fs-details h2 { margin: 5px 0 10px; font-size: 20px; color: #0f172a; }
        .fs-stock-info { font-size: 13px; margin-top: 10px; padding: 10px; background: #f1f5f9; border-radius: 8px; display: inline-block;}
        .fs-bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #e2e8f0; padding: 10px 15px; display: flex; gap: 10px; box-sizing: border-box; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); z-index: 20;}

        .loader { text-align: center; padding: 40px; color: #8b5cf6; font-size: 15px; font-weight: 600; }

        /* Cart Modal */
        .cart-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 1000; justify-content: center; align-items: flex-end;}
        .cart-modal { background: white; width: 100%; max-height: 85vh; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 20px 20px 30px; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; box-sizing: border-box;}
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 15px; }
        .cart-header h2 { margin: 0; font-size: 18px; color: #0f172a; }
        .close-cart { font-size: 24px; color: #64748b; cursor: pointer; }

        .cart-items-container { overflow-y: auto; flex: 1; margin-bottom: 15px; }
        .cart-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e2e8f0; }
        .cart-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-size: 13px; font-weight: 600; margin: 0 0 2px; color: #0f172a; }
        .cart-item-price { font-size: 14px; font-weight: 800; color: #10b981; margin: 0;}
        .qty-controls { display: flex; align-items: center; gap: 10px; background: #f1f5f9; border-radius: 8px; padding: 2px 5px;}
        .qty-btn { background: none; border: none; font-size: 16px; font-weight: bold; color: #0ea5e9; cursor: pointer; padding: 0 5px;}
        
        .seller-group-title { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; margin: 15px 0 10px; display: flex; align-items: center; gap: 5px; }
        
        .checkout-btn { background: #25D366; color: white; width: 100%; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Poppins'; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);}
        .checkout-btn:active { transform: scale(0.98); }
        .empty-cart-msg { text-align: center; color: #94a3b8; font-size: 14px; padding: 30px 0; font-weight: 500; }

        /* Beautiful Info Modal */
        .info-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(5px);}
        .info-card { background: white; width: 85%; max-width: 350px; border-radius: 24px; padding: 30px 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .info-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899); }
        .info-card-icon { width: 70px; height: 70px; background: #eff6ff; color: #3b82f6; font-size: 30px; display: flex; justify-content: center; align-items: center; border-radius: 50%; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        .info-card h3 { margin: 0 0 10px; color: #0f172a; font-size: 20px; font-weight: 800; }
        .info-card p { font-size: 14px; color: #475569; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap;}
        .btn-close-info { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); transition: 0.3s; width: 100%; }
        .btn-close-info:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <img class="dynamic-logo" id="storeLogo" src="" alt="Logo">
            <h1 class="header-title" id="storeTitle">A2Z Store</h1>
            <button class="info-btn" onclick="openInfoModal()"><i class="fas fa-info-circle"></i></button>
        </div>
        <div class="cart-icon" onclick="openCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cartCount">0</span>
        </div>
    </div>

    <div class="marquee-container" id="marqueeBar">
        <div class="marquee-text" id="marqueeText"></div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search" style="color: #8b5cf6; margin-right:10px;"></i>
            <input type="text" id="searchInput" placeholder="Search amazing products..." onkeyup="filterProducts()">
        </div>
    </div>

    <div style="background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; padding-top: 10px; margin-top: 10px;">
        <h3 class="section-title"><i class="fas fa-fire" style="color: #ef4444;"></i> Hot Deals</h3>
        <div class="hot-deals-container" id="hotDealsList"></div>

        <h3 class="section-title" style="margin-top: 10px;"><i class="fas fa-gem" style="color: #8b5cf6;"></i> All Products</h3>
        <div id="loading" class="loader"><i class="fas fa-spinner fa-spin"></i> Loading Colorful Products...</div>
        <div class="products-grid" id="productsGrid" style="display: none;"></div>
    </div>

    <div class="product-fs-modal" id="productFsModal">
        <div class="fs-header">
            <i class="fas fa-arrow-left" onclick="closeProductModal()"></i>
            <span>Product Details</span>
        </div>
        
        <div class="fs-image-slider" id="fsImageSlider"></div>
        
        <div class="fs-details">
            <div class="store-badge" id="fsStoreBadge"></div>
            <h2 id="fsProductTitle"></h2>
            <div id="fsProductPrice"></div>
            <div id="fsStockInfo" class="fs-stock-info"></div>

            <div style="margin-top: 15px;">
                <h4 style="margin: 0 0 5px; font-size: 14px; color: #0f172a;">Description</h4>
                <div id="fsProductDesc" style="font-size: 13px; color: #475569; line-height: 1.6; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; white-space: pre-wrap;"></div>
            </div>
        </div>
        
        <div class="fs-bottom-bar" id="fsBottomBar"></div>
    </div>

    <div class="cart-overlay" id="cartModal">
        <div class="cart-modal">
            <div class="cart-header">
                <h2><i class="fas fa-shopping-bag" style="color: #8b5cf6;"></i> My Cart</h2>
                <i class="fas fa-times close-cart" onclick="closeCart()"></i>
            </div>
            
            <div class="cart-items-container" id="cartItemsList"></div>
            <div id="cartCheckoutSection"></div>
        </div>
    </div>

    <div class="info-overlay" id="infoModal">
        <div class="info-card">
            <div class="info-card-icon"><i class="fas fa-bell"></i></div>
            <h3>Site Notice</h3>
            <p id="infoModalContent">Loading...</p>
            <button class="btn-close-info" onclick="closeInfoModal()">Got it!</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Registered Successfully!'))
                .catch(err => console.log('PWA Registration Failed!', err));
            });
        }
    </script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCL4WsaX5utDOWw8V29m4Pyuliqyr81Qoo", authDomain: "a2z-store-58237.firebaseapp.com", projectId: "a2z-store-58237", storageBucket: "a2z-store-58237.firebasestorage.app", messagingSenderId: "489094614330", appId: "1:489094614330:web:adaa177f194b718f001403" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        let allProducts = []; let sellersMap = {}; let cart = []; 

        window.onload = () => { fetchSettings(); fetchSellersPhoneMap(); fetchProducts(); };

       function fetchSettings() {
    db.collection("Settings").doc("StoreConfig").onSnapshot(doc => {
        if(doc.exists) {
            const data = doc.data();
            
            // 1. Logo Update
            if(data.logoUrl) { 
                document.getElementById('storeLogo').src = data.logoUrl; 
                document.getElementById('storeLogo').style.display = 'block'; 
            }
            
            // 2. Info Button Text Update (Blue Circle)
            window.infoText = data.storeInfo || "Welcome to A2Z Store! Stay tuned for more updates."; 
            
            // 3. Marquee Sliding Notification Update (Red Circle)
            const marqueeText = data.notification; // Admin panel saves it as 'notification'
            if(marqueeText && marqueeText.trim() !== "") {
                document.getElementById('marqueeBar').style.display = 'block';
                document.getElementById('marqueeText').innerText = marqueeText;
            } else {
                document.getElementById('marqueeBar').style.display = 'none';
            }
        }
    });
}

        function openInfoModal() {
            document.getElementById('infoModalContent').innerText = window.infoText || "Welcome to A2Z Store!";
            document.getElementById('infoModal').style.display = 'flex';
        }
        function closeInfoModal() { document.getElementById('infoModal').style.display = 'none'; }

        function fetchSellersPhoneMap() {
            db.collection("Sellers").onSnapshot(snap => { snap.forEach(doc => { const d = doc.data(); sellersMap[doc.id] = { phone: d.phone, storeName: d.storeName }; }); });
        }

        function filterProducts() { renderProducts(); }

        function fetchProducts() {
            db.collection("Products").orderBy("timestamp", "desc").onSnapshot(snap => {
                allProducts = []; snap.forEach(doc => { allProducts.push({ id: doc.id, ...doc.data() }); });
                document.getElementById('loading').style.display = 'none'; document.getElementById('productsGrid').style.display = 'grid';
                renderHotDeals(); renderProducts();
            });
        }

        function renderHotDeals() {
            const container = document.getElementById('hotDealsList'); container.innerHTML = "";
            if(allProducts.length === 0) { container.innerHTML = `<p style="font-size:12px; color:#64748b;">No deals available</p>`; return; }
            allProducts.forEach(prod => {
                let badgeHtml = '';
                if(prod.mrp && prod.mrp > prod.price) {
                    let discountPercent = Math.round(((prod.mrp - prod.price) / prod.mrp) * 100);
                    badgeHtml = `<div class="deal-discount-badge">↓${discountPercent}% OFF</div>`;
                }
                const imgSource = (prod.productPics && prod.productPics.length > 0) ? prod.productPics[0] : (prod.productPic || 'https://via.placeholder.com/150');
                container.innerHTML += `<div class="deal-item" onclick="openProductModal('${prod.id}')"><div class="deal-img-box"><img src="${imgSource}" loading="lazy">${badgeHtml}</div><div class="deal-price">₹${prod.price}</div></div>`;
            });
        }

        function renderProducts() {
            const container = document.getElementById('productsGrid');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = ""; let count = 0;
            allProducts.forEach(prod => {
                if (searchQuery && !prod.productName.toLowerCase().includes(searchQuery)) return; count++;
                let priceHtml = `<div class="price-row"><span class="sell-price">₹${prod.price}</span></div>`;
                if(prod.mrp && prod.mrp > prod.price) {
                    let discountPercent = Math.round(((prod.mrp - prod.price) / prod.mrp) * 100);
                    priceHtml = `<div class="price-row"><span class="sell-price">₹${prod.price}</span><span class="mrp-price">₹${prod.mrp}</span><span class="discount-tag">↓${discountPercent}%</span></div>`;
                }
                let isOutOfStock = prod.stockCount <= 0;
                let overlayHtml = isOutOfStock ? `<div class="out-of-stock-overlay">Sold Out</div>` : '';
                const imgSource = (prod.productPics && prod.productPics.length > 0) ? prod.productPics[0] : (prod.productPic || 'https://via.placeholder.com/150');
                
                let btnHtml = isOutOfStock ? `<div class="btn-group"><button class="btn-add-cart btn-disabled" disabled>Out of Stock</button></div>` : `<div class="btn-group"><button class="btn-add-cart" onclick="event.stopPropagation(); addToCart('${prod.id}', '${prod.productName.replace(/'/g, "\\'")}', ${prod.price}, '${imgSource}', '${prod.sellerId}')"><i class="fas fa-cart-plus"></i> Add</button><button class="btn-buy-now" onclick="event.stopPropagation(); buyNow('${prod.productName.replace(/'/g, "\\'")}', ${prod.price}, '${prod.sellerId}')"><i class="fab fa-whatsapp"></i> Buy</button></div>`;

                const card = document.createElement('div'); card.className = 'product-card';
                card.innerHTML = `<div class="product-img-wrapper" onclick="openProductModal('${prod.id}')">${overlayHtml}<img src="${imgSource}" class="product-img" loading="lazy"></div><div class="product-details" onclick="openProductModal('${prod.id}')"><div class="store-badge"><i class="fas fa-store"></i> ${prod.storeName}</div><h4 class="product-title">${prod.productName}</h4>${priceHtml}</div><div style="padding: 0 12px 12px;">${btnHtml}</div>`;
                container.appendChild(card);
            });
            if(count === 0) { container.innerHTML = `<div style="grid-column: span 2; text-align:center; padding: 40px 20px; color: #8b5cf6; font-weight:600;">No products found.</div>`; }
        }
        
        function openProductModal(productId) {
    const prod = allProducts.find(p => p.id === productId); 
    if(!prod) return;
    
    // --- NEW IMAGE SLIDER LOGIC ---
    const slider = document.getElementById('fsImageSlider');
    slider.innerHTML = ''; 

    let images = [];
    if(prod.productPics && prod.productPics.length > 0) {
        images = prod.productPics;
    } else if (prod.productPic) {
        images = [prod.productPic];
    } else {
        images = ['https://via.placeholder.com/150'];
    }

    images.forEach((imgSrc, index) => {
        let indicatorHtml = images.length > 1 ? `<div class="slide-indicator"><i class="far fa-images"></i> ${index + 1} / ${images.length}</div>` : '';
        slider.innerHTML += `
            <div class="fs-image-wrapper">
                <img src="${imgSrc}" class="fs-product-img" onclick="toggleZoom(this)">
                ${indicatorHtml}
                <div class="zoom-hint"><i class="fas fa-search-plus"></i> Tap to Zoom</div>
            </div>
        `;
    });
    // --- END IMAGE SLIDER LOGIC ---

    document.getElementById('fsStoreBadge').innerHTML = `<i class="fas fa-store"></i> ${prod.storeName}`;
    document.getElementById('fsProductTitle').innerText = prod.productName;
    document.getElementById('fsProductDesc').innerText = prod.description || "No description available for this product.";
    
    let priceHtml = `<div class="price-row" style="margin-bottom:0;"><span class="sell-price" style="font-size:24px;">₹${prod.price}</span></div>`;
    if(prod.mrp && prod.mrp > prod.price) {
        let discountPercent = Math.round(((prod.mrp - prod.price) / prod.mrp) * 100);
        priceHtml = `<div class="price-row" style="margin-bottom:0; align-items: center;"><span class="sell-price" style="font-size:24px;">₹${prod.price}</span><span class="mrp-price" style="font-size:16px;">₹${prod.mrp}</span><span class="discount-tag" style="font-size:14px; padding: 4px 8px;">↓${discountPercent}% OFF</span></div>`;
    }
    document.getElementById('fsProductPrice').innerHTML = priceHtml;
    
    let isOutOfStock = prod.stockCount <= 0;
    document.getElementById('fsStockInfo').innerHTML = isOutOfStock ? `<span style="color:#ef4444; font-weight:800;"><i class="fas fa-exclamation-circle"></i> Out of Stock</span>` : `<span style="color:#10b981; font-weight:700;"><i class="fas fa-check-circle"></i> Available in Stock</span>`;

    const mainImgSource = images[0];

    let btnHtml = isOutOfStock ? `<button class="btn-buy-now btn-disabled" style="width:100%; padding:14px; font-size:16px;" disabled>Currently Unavailable</button>` : `<button class="btn-add-cart" onclick="addToCart('${prod.id}', '${prod.productName.replace(/'/g, "\\'")}', ${prod.price}, '${mainImgSource}', '${prod.sellerId}')" style="flex:1; padding:14px; font-size:16px;"><i class="fas fa-cart-plus"></i> Add to Cart</button><button class="btn-buy-now" onclick="buyNow('${prod.productName.replace(/'/g, "\\'")}', ${prod.price}, '${prod.sellerId}')" style="flex:1; padding:14px; font-size:16px;"><i class="fab fa-whatsapp"></i> Buy Now</button>`;
        
    document.getElementById('fsBottomBar').innerHTML = btnHtml;
    document.getElementById('productFsModal').style.display = 'flex';
}

        function closeProductModal() { document.getElementById('productFsModal').style.display = 'none'; }
        function toggleZoom(imgEl) { 
    imgEl.classList.toggle('zoomed'); 
    if(imgEl.classList.contains('zoomed')) {
        const wrapper = imgEl.parentElement;
        // জুম হওয়ার পর ছবিটির একদম মাঝখানে ফোকাস করবে, যেখান থেকে সবদিকে স্ক্রল করা যাবে
        wrapper.scrollLeft = (wrapper.scrollWidth - wrapper.clientWidth) / 2;
        wrapper.scrollTop = (wrapper.scrollHeight - wrapper.clientHeight) / 2;
    }
}
        function formatPhoneForWA(phone) { if(!phone) return null; let p = phone.replace(/\D/g, ''); if(p.length === 10) p = '91' + p; return p; }

        function buyNow(prodName, price, sellerId) {
            const sellerInfo = sellersMap[sellerId];
            if(!sellerInfo || !sellerInfo.phone) { alert("Seller phone number not found!"); return; }
            const waPhone = formatPhoneForWA(sellerInfo.phone);
            const message = `Hello ${sellerInfo.storeName},\nI want to buy:\n🛍️ *${prodName}*\n💰 Price: ₹${price}\n\nIs this available?`;
            window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function addToCart(id, name, price, pic, sellerId) {
            const existingItem = cart.find(item => item.id === id);
            if(existingItem) { existingItem.qty += 1; } else { cart.push({ id, name, price, pic, sellerId, qty: 1 }); }
            updateCartBadge();
            const badge = document.getElementById('cartCount'); badge.style.transform = 'scale(1.5)'; setTimeout(() => badge.style.transform = 'scale(1)', 200);
        }

        function updateCartBadge() { let totalQty = cart.reduce((sum, item) => sum + item.qty, 0); document.getElementById('cartCount').innerText = totalQty; }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if(item) { item.qty += change; if(item.qty <= 0) cart = cart.filter(i => i.id !== id); updateCartBadge(); renderCartItems(); }
        }

        function openCart() { document.getElementById('cartModal').style.display = 'flex'; renderCartItems(); }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        function renderCartItems() {
            const container = document.getElementById('cartItemsList'); const checkoutSection = document.getElementById('cartCheckoutSection');
            container.innerHTML = ""; checkoutSection.innerHTML = "";
            if(cart.length === 0) { container.innerHTML = `<div class="empty-cart-msg"><i class="fas fa-shopping-basket" style="font-size:40px; color:#cbd5e1; margin-bottom:10px; display:block;"></i> Your cart is empty</div>`; return; }

            let groupedCart = {};
            cart.forEach(item => { if(!groupedCart[item.sellerId]) groupedCart[item.sellerId] = []; groupedCart[item.sellerId].push(item); });

            for (let sellerId in groupedCart) {
                const sellerInfo = sellersMap[sellerId]; const storeName = sellerInfo ? sellerInfo.storeName : "Unknown Store";
                container.innerHTML += `<div class="seller-group-title"><i class="fas fa-store"></i> Items from ${storeName}</div>`;
                let sellerTotal = 0; let whatsappMsg = `Hello ${storeName},\nI want to order the following items from my cart:\n\n`;

                groupedCart[sellerId].forEach((item, index) => {
                    const itemTotal = item.price * item.qty; sellerTotal += itemTotal;
                    whatsappMsg += `${index + 1}. *${item.name}*\n   ₹${item.price} x ${item.qty} = ₹${itemTotal}\n`;
                    container.innerHTML += `<div class="cart-item"><img src="${item.pic}" alt="prod"><div class="cart-item-info"><p class="cart-item-title">${item.name}</p><p class="cart-item-price">₹${item.price}</p></div><div class="qty-controls"><button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button><span style="font-size:14px; font-weight:700; width:20px; text-align:center;">${item.qty}</span><button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button></div></div>`;
                });
                whatsappMsg += `\n*Total Amount: ₹${sellerTotal}*\nPlease confirm my order.`;

                if(sellerInfo && sellerInfo.phone) {
                    const waPhone = formatPhoneForWA(sellerInfo.phone); const encodedMsg = encodeURIComponent(whatsappMsg);
                    checkoutSection.innerHTML += `<button class="checkout-btn" onclick="window.open('https://wa.me/${waPhone}?text=${encodedMsg}', '_blank')"><i class="fab fa-whatsapp" style="font-size: 20px;"></i> Order from ${storeName} (₹${sellerTotal})</button>`;
                }
            }
        }
    </script>
</body>
