<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Panel | Business Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; color: #1e293b; padding-bottom: 50px; }
        
        /* Premium Toast Notification */
        #customToast { visibility: hidden; min-width: 250px; text-align: center; border-radius: 50px; padding: 12px 25px; position: fixed; z-index: 9999; left: 50%; bottom: -50px; transform: translateX(-50%); font-size: 14px; font-weight: 600; box-shadow: 0 10px 40px rgba(0,0,0,0.2); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); display: flex; align-items: center; justify-content: center; gap: 10px; color: white; backdrop-filter: blur(10px); }
        #customToast.show { visibility: visible; opacity: 1; bottom: 40px; }
        .toast-error { background: rgba(239, 68, 68, 0.95); border: 1px solid #f87171; } 
        .toast-success { background: rgba(16, 185, 129, 0.95); border: 1px solid #34d399; } 
        .toast-warning { background: rgba(245, 158, 11, 0.95); border: 1px solid #fbbf24; }

        /* Login Screen */
        #seller-login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1e293b, #0f172a); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .login-box h2 { margin: 0 0 5px; color: #0f172a; }
        .login-box p { font-size: 13px; color: #64748b; margin-bottom: 20px; }
        .login-input-group { margin-bottom: 15px; text-align: left; }
        .login-input-group label { font-size: 12px; color: #475569; font-weight: 600; margin-bottom: 5px; display: block; }
        .login-box input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; font-family: 'Poppins'; transition: 0.3s;}
        .login-box input:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
        .btn-login { background: #f59e0b; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s;}
        .btn-login:hover { background: #d97706; }

        /* Header & Summary */
        .header { background: #0f172a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; font-weight: 600; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dynamic-logo { height: 35px; border-radius: 5px; display: none; object-fit: contain; background: white; padding: 2px;} 
        .btn-settings { background: transparent; color: white; border: none; font-size: 22px; cursor: pointer; transition: transform 0.3s; padding: 0; }
        .btn-settings:active { transform: rotate(45deg); }

        .profile-summary { background: white; margin: 15px; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 5px solid #10b981; }
        .profile-summary img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid #e2e8f0; }
        .profile-info { flex: 1; }
        .profile-summary h3 { margin: 0; font-size: 16px; color: #0f172a; }
        .profile-summary p { margin: 2px 0 0; font-size: 12px; color: #64748b; }
        .profile-sales { text-align: right; border-left: 1px dashed #cbd5e1; padding-left: 15px; cursor: pointer; transition: 0.3s; }
        .profile-sales:hover { opacity: 0.8; transform: scale(1.05); }
        .profile-sales p { font-size: 10px; color: #64748b; font-weight: 700; text-transform: uppercase; margin: 0 0 3px; }
        .profile-sales h2 { margin: 0; font-size: 20px; color: #0ea5e9; }

        /* Form Inputs */
        .form-container { background: white; padding: 20px; margin: 0 15px 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 5px solid #f59e0b; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: #475569; margin-bottom: 6px; font-weight: 600; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: 'Poppins'; outline: none; font-size: 14px; transition: 0.3s;}
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
        .row { display: flex; gap: 10px; }
        .row .input-group { flex: 1; }
        .btn-action { background: #f59e0b; color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 5px; transition: 0.3s; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);}
        .btn-action:active { transform: scale(0.98); }

        /* Products List */
        .products-scroll-container { max-height: 450px; overflow-y: auto; padding-right: 5px; padding-bottom: 10px;}
        .products-scroll-container::-webkit-scrollbar { width: 6px; }
        .products-scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .product-item { background: white; margin: 0 15px 12px; border-radius: 15px; border: 1px solid #e2e8f0; display: flex; align-items: center; padding: 15px; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s;}
        .product-item:hover { box-shadow: 0 6px 15px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .product-img { width: 75px; height: 75px; border-radius: 10px; object-fit: cover; background: #f1f5f9; border: 1px solid #e2e8f0;}
        .product-info { flex: 1; }
        .product-info h4 { margin: 0 0 6px; font-size: 15px; color: #0f172a; line-height: 1.2; font-weight: 700;}
        .ecommerce-price { display: flex; align-items: center; gap: 8px; font-family: 'Arial', sans-serif; margin-bottom: 6px; }
        .price-discount { color: #16a34a; font-size: 12px; font-weight: 700; background:#dcfce7; padding:2px 6px; border-radius:6px;}
        .price-mrp { color: #94a3b8; font-size: 13px; text-decoration: line-through; }
        .price-sell { color: #0f172a; font-size: 18px; font-weight: 800; }
        .stock-badge { display: inline-block; background: #f1f5f9; color: #475569; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid #e2e8f0; }
        .admin-comm-badge { display: inline-block; background: #fef08a; color: #854d0e; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid #fde047; margin-left: 5px;}

        /* Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px);}
        .edit-card { background: white; width: 90%; max-width: 380px; max-height: 90vh; overflow-y: auto; border-radius: 20px; padding: 25px; text-align: left; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; width: 100%; }
        .custom-select-input { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Poppins'; outline: none; font-size: 14px; background: #fff; transition: 0.3s; cursor: text;}
        .custom-select-input:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15); }
        .custom-dropdown { position: absolute; top: 100%; left: 0; width: 100%; max-height: 250px; overflow-y: auto; background: white; border: 1px solid #e2e8f0; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; display: none; margin-top: 5px; }
        .custom-option { padding: 10px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s;}
        .custom-option:hover { background: #f8fafc; padding-left: 18px;}
        .dropdown-prod-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid #e2e8f0; }
        .custom-option-details { flex: 1; display: flex; flex-direction: column; }
        .custom-option-title { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 2px;}
        .custom-option-price { font-size: 13px; font-weight: 700; color: #10b981; }
        .custom-option-stock { font-size: 11px; color: #64748b; background: #f1f5f9; padding: 3px 8px; border-radius: 6px; font-weight: 600; white-space: nowrap;}
        
        /* History Items */
        .history-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; }
        .history-item-left { display: flex; align-items: center; gap: 10px; }
        .history-item-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; border: 1px solid #cbd5e1; }
        .history-item-text h4 { margin: 0 0 4px; font-size: 14px; color: #0f172a; font-weight: 700; line-height: 1.2;}
        .history-item-text p { margin: 0; font-size: 11px; color: #64748b; font-weight: 500;}
        .history-item-right { text-align: right; }
        .history-item-right h3 { margin: 0; font-size: 18px; color: #10b981; font-weight: 800;}
        
        .buyer-contact-btn { display: flex; gap: 5px; margin-top: 10px; }
        .btn-call, .btn-sms, .btn-wa { flex: 1; color: white; border: none; padding: 6px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; transition: 0.3s; }
        .btn-call { background: #0ea5e9; } .btn-sms { background: #f59e0b; } .btn-wa { background: #10b981; }
        .btn-call:active, .btn-sms:active, .btn-wa:active { transform: scale(0.95); }

        .btn-del-history { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; transition: 0.3s; position: absolute; right: 15px; top: 15px; display: flex; justify-content: center; align-items: center;}
        
        /* Settings Menu Buttons */
        .settings-menu-btn { width: 100%; padding: 15px; margin-bottom: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Poppins'; transition: 0.3s; box-sizing: border-box; }
        .btn-menu-backup { background: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd; }
        .btn-menu-restore { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .btn-menu-logout { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; margin-bottom: 0;}
        
        /* Image Preview Scroll Container */
        .img-preview-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-top: 10px; }
        .img-preview-container::-webkit-scrollbar { height: 4px; }
        .img-preview-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="customToast"></div>

    <div id="seller-login-overlay">
        <div class="login-box">
            <h2><i class="fas fa-store" style="color: #f59e0b;"></i> Seller Portal</h2>
            <p>Login to manage your store</p>
            <div class="login-input-group"><label>Phone Number</label><input type="tel" id="sellerPhone" placeholder="Enter Phone Number"></div>
            <div class="login-input-group"><label>Date of Birth</label><input type="date" id="sellerDob"></div>
            <div class="login-input-group"><label>4-Digit Password</label><input type="password" id="sellerPass" placeholder="Enter Password" maxlength="4"></div>
            
            <button class="btn-login" id="loginBtn" onclick="loginSeller()">Access Dashboard</button>
        </div>
    </div>

    <div id="main-seller-content" style="display: none;">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img class="dynamic-logo" id="headerLogo" src="" alt="Logo">
            </div>
            <button class="btn-settings" onclick="openSettingsModal()"><i class="fas fa-cog"></i></button>
        </div>

        <div class="profile-summary">
            <img id="dashboardProfilePic" src="https://via.placeholder.com/100" alt="Profile">
            <div class="profile-info">
                <h3 id="dashboardStoreName">Store Name</h3>
                <p id="dashboardSellerName">Seller Name</p>
            </div>
            <div class="profile-sales" onclick="openHistoryModal()" title="Click to view Sales History">
                <p>Total Sales <i class="fas fa-info-circle" style="font-size: 9px; color:#94a3b8;"></i></p>
                <h2 id="dashboardTotalSales">₹0</h2>
            </div>
        </div>

        <div class="form-container">
            <h3 style="margin-top:0; border-bottom:1px solid #e2e8f0; padding-bottom:10px; font-size:16px; color: #0f172a;"><i class="fas fa-box-open" style="color:#f59e0b;"></i> Add New Product</h3>
            <div class="input-group"><label>Product Name</label><input type="text" id="prodName" placeholder="e.g. Cotton T-Shirt"></div>
            <div class="input-group"><label>Product Category (Optional)</label><select id="prodCategory"><option value="">-- Select Category --</option></select></div>
            <div class="input-group"><label>Short Note (যেমন: Per Piece, 1 Kg)</label><input type="text" id="prodShortNote" placeholder="e.g. Per piece"></div>
            <div class="row">
                <div class="input-group"><label>MRP (₹)</label><input type="number" id="prodMrp" placeholder="Maximum Price"></div>
                <div class="input-group"><label>Selling Price (₹)</label><input type="number" id="prodPrice" placeholder="Final Price"></div>
            </div>
            <div style="background: #f8fafc; padding: 12px; border-radius: 10px; border: 1px dashed #cbd5e1; margin-bottom: 15px;">
                <label style="display: block; font-size: 11px; color: #b45309; margin-bottom: 8px; font-weight: 700; text-transform: uppercase;"><i class="fas fa-handshake"></i> Admin Profit Share</label>
                <div class="row">
                    <div class="input-group" style="margin-bottom: 0;"><select id="adminCommType"><option value="percent">Percentage (%)</option><option value="flat">Flat Amount (₹)</option></select></div>
                    <div class="input-group" style="margin-bottom: 0;"><input type="number" id="adminCommValue" placeholder="Value (e.g. 10)"></div>
                </div>
            </div>
            <div class="row"><div class="input-group"><label>Total Stock</label><input type="number" id="prodStock" placeholder="e.g. 50"></div></div>
            <div class="input-group">
                <label>Product Description</label>
                <textarea id="prodDesc" rows="3" placeholder="Write product details here..." style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Poppins'; outline: none; font-size: 14px; box-sizing: border-box;"></textarea>
            </div>
            <div class="input-group">
                <label>Product Images (Select Multiple)</label>
                <div style="display: flex; gap: 10px;">
                    <label style="flex: 1; background: #0ea5e9; color: white; padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight:600;"><i class="fas fa-camera"></i> Camera<input type="file" accept="image/*" capture="environment" onchange="addProdPicChosen(this)" style="display: none;"></label>
                    <label style="flex: 1; background: #f59e0b; color: white; padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight:600;"><i class="fas fa-images"></i> Gallery<input type="file" accept="image/*" multiple onchange="addProdPicChosen(this)" style="display: none;"></label>
                </div>
                <div id="add-prod-pic-preview" class="img-preview-container"></div>
            </div>
            <button class="btn-action" id="addProdBtn" onclick="addProduct()">Publish Product</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin: 25px 15px 15px;">
            <h3 style="margin: 0; font-size: 16px; color: #0f172a;">My Products</h3>
            <div style="display: flex; gap: 8px;">
                <button onclick="openHistoryModal()" style="background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);"><i class="fas fa-history"></i> History</button>
                <button onclick="openRecordSaleModal()" style="background: #10b981; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);"><i class="fas fa-cash-register"></i> Sale</button>
            </div>
        </div>
        <div id="products-container" class="products-scroll-container"></div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="edit-card" style="max-width: 320px; text-align: center;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px;">
                <h3 style="margin:0; color:#0f172a;"><i class="fas fa-cog" style="color:#64748b;"></i> Settings</h3>
                <i class="fas fa-times" onclick="closeSettingsModal()" style="cursor: pointer; color: #64748b; font-size: 20px;"></i>
            </div>
            
            <button id="btnBackupUI" class="settings-menu-btn btn-menu-backup" onclick="requestAdminAction('backup')">
                <i class="fas fa-cloud-download-alt"></i> Request Backup Data
            </button>
            
            <button id="btnRestoreUI" class="settings-menu-btn btn-menu-restore" onclick="requestAdminAction('restore')">
                <i class="fas fa-cloud-upload-alt"></i> Request Restore Data
            </button>

            <input type="hidden" id="restoreReqId">
            <input type="file" id="restoreFileInput" accept=".json" style="display:none;" onchange="handleFileSelect(event)">
            
            <hr style="border: 0; border-top: 1px dashed #e2e8f0; margin: 20px 0;">
            <button class="settings-menu-btn btn-menu-logout" onclick="logoutSeller()"><i class="fas fa-sign-out-alt"></i> Secure Logout</button>
        </div>
    </div>

    <div class="modal-overlay" id="editProdModal">
        <div class="edit-card">
            <h3 style="margin-top:0; border-bottom:1px solid #e2e8f0; padding-bottom:15px; color:#0f172a;"><i class="fas fa-edit" style="color:#0ea5e9;"></i> Edit Product</h3>
            <input type="hidden" id="editProdId">
            <div class="input-group"><label>Product Name</label><input type="text" id="editProdName" placeholder="Edit product name"></div>
            <div class="input-group"><label>Product Category</label><select id="editProdCategory"><option value="">-- Select Category --</option></select></div>
            <div class="input-group"><label>Short Note</label><input type="text" id="editProdShortNote"></div>
            <div class="row">
                <div class="input-group"><label>MRP (₹)</label><input type="number" id="editProdMrp"></div>
                <div class="input-group"><label>Sell Price (₹)</label><input type="number" id="editProdPrice"></div>
            </div>
            <div style="background: #fffbeb; padding: 15px; border-radius: 10px; border: 1px solid #fde68a; margin-bottom: 15px;">
                <label style="font-size: 11px; color: #d97706; font-weight: bold; margin-bottom: 8px; display: block;"><i class="fas fa-handshake"></i> Admin Share</label>
                <div class="row">
                    <div class="input-group" style="margin-bottom: 0;"><select id="editAdminCommType"><option value="percent">Percent (%)</option><option value="flat">Flat (₹)</option></select></div>
                    <div class="input-group" style="margin-bottom: 0;"><input type="number" id="editAdminCommValue"></div>
                </div>
            </div>
            <div class="input-group"><label>Available Stock</label><input type="number" id="editProdStock"></div>
            
            <div class="input-group">
                <label>Product Description</label>
                <textarea id="editProdDesc" rows="3" style="width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Poppins'; outline: none; font-size: 14px; box-sizing: border-box;"></textarea>
            </div>

            <div class="input-group">
                <label>Update Product Images</label>
                <div style="display: flex; gap: 10px;">
                    <label style="flex: 1; background: #0ea5e9; color: white; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight:600;"><i class="fas fa-camera"></i> Camera<input type="file" accept="image/*" capture="environment" onchange="editProdPicChosen(this)" style="display: none;"></label>
                    <label style="flex: 1; background: #f59e0b; color: white; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight:600;"><i class="fas fa-images"></i> Gallery<input type="file" accept="image/*" multiple onchange="editProdPicChosen(this)" style="display: none;"></label>
                </div>
                <div id="edit-prod-pic-preview" class="img-preview-container"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="closeEditModal()" style="flex:1; padding:12px; border:none; border-radius:8px; background:#f1f5f9; cursor:pointer; font-weight:700; color:#475569;">Cancel</button>
                <button onclick="saveProductEdits()" style="flex:1; padding:12px; border:none; border-radius:8px; background:#10b981; color:white; cursor:pointer; font-weight:700;">Save Updates</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="recordSaleModal">
        <div class="edit-card">
            <h3 style="margin-top:0; border-bottom:1px solid #e2e8f0; padding-bottom:15px; color:#0f172a; text-align:center;"><i class="fas fa-cash-register" style="color:#10b981;"></i> Record Sale</h3>
            <div class="input-group">
                <label>Search & Select Product</label>
                <div class="custom-select-wrapper">
                    <div style="position: relative; display: flex; align-items: center;">
                        <img id="selectedProdImg" src="" style="width: 30px; height: 30px; border-radius: 5px; object-fit: cover; position: absolute; left: 10px; display: none; z-index: 10; pointer-events: none;">
                        <input type="text" id="saleProductSearch" class="custom-select-input" placeholder="Type product name to search..." oninput="handleSearchInput()" onclick="toggleSaleDropdown()">
                    </div>
                    <input type="hidden" id="saleProductId">
                    <input type="hidden" id="saleProductPrice">

        async function performBackup(reqId) { const sid = localStorage.getItem("seller_id"); showToast("Preparing backup...", "warning"); try { const pSnap = await db.collection("Products").where("sellerId", "==", sid).get(); const hSnap = await db.collection("SalesHistory").where("sellerId", "==", sid).get(); const data = { products: [], salesHistory: [] }; pSnap.forEach(doc => data.products.push(doc.data())); hSnap.forEach(doc => data.salesHistory.push(doc.data())); const jsonStr = JSON.stringify(data); try { const handle = await window.showSaveFilePicker({ suggestedName: `A2Z_Backup_${new Date().toLocaleDateString('en-IN').replace(/\//g, '-')}.json`, types: [{ description: 'JSON File', accept: {'application/json': ['.json']} }] }); const writable = await handle.createWritable(); await writable.write(jsonStr); await writable.close(); showToast("Backup saved successfully to chosen folder!", "success"); } catch (err) { if (err.name !== 'AbortError') { const blob = new Blob([jsonStr], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `A2Z_Backup_${sid}.json`; a.click(); showToast("Backup Downloaded Successfully!", "success"); } } await db.collection("AdminRequests").doc(reqId).delete(); closeSettingsModal(); } catch(e) { showToast("Backup failed: " + e.message, "error"); } }
        async function handleFileSelect(event) { const file = event.target.files[0]; if (!file) return; const sid = localStorage.getItem("seller_id"); const sName = localStorage.getItem("seller_name"); const storeName = localStorage.getItem("seller_store"); showToast("Extracting data... Please wait.", "warning"); const reader = new FileReader(); reader.onload = async function(e) { try { const data = JSON.parse(e.target.result); if (data.records && Array.isArray(data.records)) { const uniqueProducts = new Map(); data.records.forEach(record => { if (record.cart && Array.isArray(record.cart)) { record.cart.forEach(item => { if (item.name && !uniqueProducts.has(item.name)) { const dummyImageUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random&color=fff&size=300`; uniqueProducts.set(item.name, { sellerId: sid, storeName: storeName, sellerName: sName, productName: item.name, mrp: Number(item.price) || 0, price: Number(item.price) || 0, adminCommType: "percent", adminCommValue: 10, stockCount: 50, soldCount: 0, productPics: [dummyImageUrl], productPic: dummyImageUrl, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } }); } }); const productsToAdd = Array.from(uniqueProducts.values()); if (productsToAdd.length > 0) { const addPromises = productsToAdd.map(p => db.collection("Products").add(p)); await Promise.all(addPromises); showToast(`${productsToAdd.length} Products Extracted & Added!`, "success"); } else { showToast("No valid products found in old backup.", "error"); } } else if (data.products && data.salesHistory) { const pSnap = await db.collection("Products").where("sellerId", "==", sid).get(); for(let doc of pSnap.docs) await doc.ref.delete(); const hSnap = await db.collection("SalesHistory").where("sellerId", "==", sid).get(); for(let doc of hSnap.docs) await doc.ref.delete(); for(let p of data.products) { p.sellerId = sid; p.productPics = p.productPics || (p.productPic ? [p.productPic] : []); p.productPic = p.productPic || (p.productPics.length > 0 ? p.productPics[0] : ""); p.timestamp = firebase.firestore.FieldValue.serverTimestamp(); await db.collection("Products").add(p); } for(let h of data.salesHistory) { h.sellerId = sid; h.productPic = h.productPic || ""; h.timestamp = firebase.firestore.FieldValue.serverTimestamp(); await db.collection("SalesHistory").add(h); } showToast("Data Restored Successfully!", "success"); } else { throw new Error("Invalid backup format."); } const reqId = document.getElementById('restoreReqId').value; if(reqId) await db.collection("AdminRequests").doc(reqId).delete(); closeSettingsModal(); event.target.value = ''; } catch (err) { showToast("Restore failed: " + err.message, "error"); event.target.value = ''; } }; reader.readAsText(file); }
        async function executeDeleteHistory(historyId, reqId) { try { const historyRef = db.collection("SalesHistory").doc(historyId); const historyDoc = await historyRef.get(); if(historyDoc.exists) { const data = historyDoc.data(); const prodId = data.productId; const qty = data.qty; if(prodId) { try { await db.collection("Products").doc(prodId).update({ stockCount: firebase.firestore.FieldValue.increment(qty), soldCount: firebase.firestore.FieldValue.increment(-qty) }); } catch(err) {} } } await historyRef.delete(); if(reqId) { await db.collection("AdminRequests").doc(reqId).delete(); } showToast("Sale Record Deleted & Stocks Updated!", "success"); fetchSalesHistory(); } catch(e) { console.error("Delete failed: ", e); showToast("Error: " + e.message, "error"); } }

        function fetchMyProducts(sellerId) {
    db.collection("Products").where("sellerId", "==", sellerId).onSnapshot(snap => {
        const cont = document.getElementById('products-container'); cont.innerHTML = "";
        currentSellerProducts = []; 
        if(snap.empty) { 
            cont.innerHTML = `<div style="text-align:center; padding:30px 20px; color:#64748b; background:white; border-radius:15px; border:1px dashed #cbd5e1;"><i class="fas fa-box-open" style="font-size:30px; margin-bottom:10px; color:#cbd5e1;"></i><br>No products added yet.</div>`; 
            return; 
        }

        let tempArr = [];
        snap.forEach(doc => { const d = doc.data(); d.id = doc.id; tempArr.push(d); });
        
        // Manual sorting to bypass Firebase index error
        tempArr.sort((a,b) => {
            const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
            const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
            return timeB - timeA;
        });

        tempArr.forEach(d => {
            currentSellerProducts.push(d); 
            let discountHtml = ``; if(d.mrp && d.mrp > d.price) { let discountPercent = Math.round(((d.mrp - d.price) / d.mrp) * 100); discountHtml = `<span class="price-discount">↓${discountPercent}%</span> <span class="price-mrp">₹${d.mrp}</span>`; }
            let commText = d.adminCommType === 'percent' ? `${d.adminCommValue}%` : `₹${d.adminCommValue}`;
            const imgSource = (d.productPics && d.productPics.length > 0) ? d.productPics[0] : (d.productPic || 'https://via.placeholder.com/100');

            const item = document.createElement('div'); item.className = 'product-item';
            item.innerHTML = `<img src="${imgSource}" class="product-img"><div class="product-info"><h4>${d.productName}</h4><div class="ecommerce-price">${discountHtml}<span class="price-sell">₹${d.price}</span></div><div><span class="stock-badge">Stock: ${d.stockCount} | Sold: ${d.soldCount}</span><span class="admin-comm-badge" title="Admin Share">Admin: ${commText}</span></div></div><div style="display:flex; flex-direction:column; gap:8px;"><button onclick="openEditModal('${d.id}')" style="background:#f1f5f9; border:none; color:#0ea5e9; font-size:14px; padding:10px; border-radius:8px; cursor:pointer; transition:0.3s;"><i class="fas fa-edit"></i></button><button onclick="deleteProduct('${d.id}')" style="background:#fee2e2; border:none; color:#ef4444; font-size:14px; padding:10px; border-radius:8px; cursor:pointer; transition:0.3s;"><i class="fas fa-trash"></i></button></div>`;
            cont.appendChild(item);
        });
    });
}
        function openEditModal(id) { const p = currentSellerProducts.find(item => item.id === id); if(!p) return; document.getElementById('editProdId').value = p.id; document.getElementById('editProdCategory').value = p.category || "";document.getElementById('editProdName').value = p.productName;
        document.getElementById('editProdShortNote').value = p.shortNote || "";document.getElementById('editProdMrp').value = p.mrp > 0 ? p.mrp : ""; document.getElementById('editProdPrice').value = p.price; document.getElementById('editAdminCommType').value = p.adminCommType || "percent"; document.getElementById('editAdminCommValue').value = p.adminCommValue; document.getElementById('editProdStock').value = p.stockCount; document.getElementById('editProdDesc').value = p.description || ""; tempEditProdPics = p.productPics ? [...p.productPics] : (p.productPic ? [p.productPic] : []); renderEditProdPicPreview(); document.getElementById('editProdModal').style.display = 'flex'; }
        function closeEditModal() { document.getElementById('editProdModal').style.display = 'none'; }
        async function saveProductEdits() {
    const id = document.getElementById('editProdId').value; 
    const pName = document.getElementById('editProdName').value; // নাম নেওয়ার জন্য নতুন লাইন
    const pShortNote = document.getElementById('editProdShortNote').value;
    const pCategory = document.getElementById('editProdCategory').value;
    const mrp = Number(document.getElementById('editProdMrp').value); 
    const price = Number(document.getElementById('editProdPrice').value); 
    const cType = document.getElementById('editAdminCommType').value; 
    const cValue = Number(document.getElementById('editAdminCommValue').value); 
    const stock = Number(document.getElementById('editProdStock').value);
    const desc = document.getElementById('editProdDesc').value; 
    
    if(!pName) return showToast("Product Name cannot be empty!", "error");
    if(mrp > 0 && price > mrp) return showToast("Selling Price cannot be greater than MRP!", "error");
    
    try { 
        const docRef = db.collection("Products").doc(id);
        const docSnap = await docRef.get();
        if(!docSnap.exists) {
            closeEditModal();
            return showToast("This product has been deleted!", "error");
        }
        
        await docRef.update({ 
            productName: pName, // ডেটাবেসে নাম আপডেট করার লাইন
            shortNote: pShortNote,
            category: pCategory,
            mrp: mrp, price: price, adminCommType: cType, adminCommValue: cValue, stockCount: stock,
            description: desc, 
            productPics: tempEditProdPics,
            productPic: tempEditProdPics.length > 0 ? tempEditProdPics[0] : ""
        }); 
        closeEditModal(); showToast("Product Details Updated!", "success"); 
    } catch(e) { 
        closeEditModal();
        showToast("Product might be deleted already!", "error"); 
    }
}

        function openRecordSaleModal() { document.getElementById('saleProductSearch').value = ''; document.getElementById('saleProductId').value = ''; document.getElementById('saleProductPrice').value = ''; document.getElementById('saleProductStock').value = ''; document.getElementById('saleProductPic').value = ''; document.getElementById('saleQty').value = 1; document.getElementById('saleTotalAmount').innerText = "₹0"; document.getElementById('buyerName').value = ''; document.getElementById('buyerPhone').value = ''; document.getElementById('buyerAddress').value = ''; document.getElementById('selectedProdImg').style.display = 'none'; document.getElementById('saleProductSearch').style.paddingLeft = '15px'; const dropdown = document.getElementById('saleProductDropdown'); dropdown.innerHTML = ''; currentSellerProducts.forEach(p => { const pPic = (p.productPics && p.productPics.length > 0) ? p.productPics[0] : (p.productPic || 'https://via.placeholder.com/50'); dropdown.innerHTML += `<div class="custom-option" onclick="selectSaleProduct('${p.id}')"><img src="${pPic}" class="dropdown-prod-img"><div class="custom-option-details"><span class="custom-option-title">${p.productName}</span><span class="custom-option-price">₹${p.price}</span></div><span class="custom-option-stock">Stock: ${p.stockCount}</span></div>`; }); document.getElementById('recordSaleModal').style.display = 'flex'; }
        function toggleSaleDropdown() { document.getElementById('saleProductDropdown').style.display = 'block'; }
        function handleSearchInput() { document.getElementById('selectedProdImg').style.display = 'none'; document.getElementById('saleProductSearch').style.paddingLeft = '15px'; const input = document.getElementById('saleProductSearch').value.toLowerCase(); const dropdown = document.getElementById('saleProductDropdown'); const options = dropdown.getElementsByClassName('custom-option'); let hasVisible = false; for (let i = 0; i < options.length; i++) { const text = options[i].innerText.toLowerCase(); if (text.includes(input)) { options[i].style.display = "flex"; hasVisible = true; } else { options[i].style.display = "none"; } } dropdown.style.display = hasVisible ? 'block' : 'none'; }
        function selectSaleProduct(id) { const p = currentSellerProducts.find(item => item.id === id); if(!p) return; const pPic = (p.productPics && p.productPics.length > 0) ? p.productPics[0] : (p.productPic || 'https://via.placeholder.com/50'); document.getElementById('saleProductId').value = p.id; document.getElementById('saleProductSearch').value = p.productName; document.getElementById('saleProductPrice').value = p.price; document.getElementById('saleProductStock').value = p.stockCount; document.getElementById('saleProductPic').value = pPic; const imgEl = document.getElementById('selectedProdImg'); imgEl.src = pPic; imgEl.style.display = 'block'; document.getElementById('saleProductSearch').style.paddingLeft = '48px'; document.getElementById('saleProductDropdown').style.display = 'none'; calculateSaleTotal(); }
        function calculateSaleTotal() { const id = document.getElementById('saleProductId').value; const qty = Number(document.getElementById('saleQty').value); if(id && qty > 0) { const price = Number(document.getElementById('saleProductPrice').value); document.getElementById('saleTotalAmount').innerText = "₹" + (price * qty); } else { document.getElementById('saleTotalAmount').innerText = "₹0"; } }
        async function saveRecordSale() { const prodId = document.getElementById('saleProductId').value; const qty = Number(document.getElementById('saleQty').value); const stock = Number(document.getElementById('saleProductStock').value); const prodName = document.getElementById('saleProductSearch').value; const price = Number(document.getElementById('saleProductPrice').value); const pic = document.getElementById('saleProductPic').value; const bName = document.getElementById('buyerName').value.trim(); const bPhone = document.getElementById('buyerPhone').value.trim(); const bAddress = document.getElementById('buyerAddress').value.trim(); if(!prodId) return showToast("Please search and select a product.", "error"); if(qty <= 0) return showToast("Enter a valid quantity.", "error"); if(qty > stock) return showToast(`Not enough stock! Left: ${stock}`, "error"); document.getElementById('confirmSaleBtn').innerText = "Recording..."; document.getElementById('confirmSaleBtn').disabled = true; try { const prodRef = db.collection("Products").doc(prodId); const prodDoc = await prodRef.get(); if(!prodDoc.exists) { document.getElementById('confirmSaleBtn').innerText = "Confirm Sale"; document.getElementById('confirmSaleBtn').disabled = false; return showToast("This product no longer exists!", "error"); } await prodRef.update({ stockCount: firebase.firestore.FieldValue.increment(-qty), soldCount: firebase.firestore.FieldValue.increment(qty) }); const currentYear = new Date().getFullYear().toString(); const totalAmt = price * qty; await db.collection("SalesHistory").add({ sellerId: localStorage.getItem("seller_id"), productId: prodId, productName: prodName, productPic: pic, qty: qty, price: price, totalAmount: totalAmt, year: currentYear, buyerName: bName, buyerPhone: bPhone, buyerAddress: bAddress, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); notifyAdminActivity(`Recorded a sale of ₹${totalAmt} for ${prodName}`); showToast("Sale Recorded Successfully!", "success"); closeRecordSaleModal(); } catch(e) { showToast("Error: " + e.message, "error"); } document.getElementById('confirmSaleBtn').innerText = "Confirm Sale"; document.getElementById('confirmSaleBtn').disabled = false; }
        function closeRecordSaleModal() { document.getElementById('recordSaleModal').style.display = 'none'; }

        function openHistoryModal() { document.getElementById('historyModal').style.display = 'flex'; document.getElementById('historyYear').value = new Date().getFullYear().toString(); fetchSalesHistory(); }
        function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }
        function fetchSalesHistory() { const sid = localStorage.getItem("seller_id"); const year = document.getElementById('historyYear').value; const container = document.getElementById('historyListContainer'); container.innerHTML = `<div style="text-align:center; padding:20px; color:#3b82f6;"><i class="fas fa-spinner fa-spin"></i> Loading History...</div>`; db.collection("SalesHistory").where("sellerId", "==", sid).get().then(snap => { container.innerHTML = ""; let historyData = []; snap.forEach(doc => { const d = doc.data(); d.id = doc.id; if(d.year === year) historyData.push(d); }); historyData.sort((a, b) => { const timeA = a.timestamp ? a.timestamp.toMillis() : 0; const timeB = b.timestamp ? b.timestamp.toMillis() : 0; return timeB - timeA; }); if(historyData.length === 0) { container.innerHTML = `<div style="text-align:center; padding:20px; color:#64748b; font-size:13px; background:#f1f5f9; border-radius:10px;">No sales recorded in ${year}.</div>`; return; } historyData.forEach(d => { const date = d.timestamp ? d.timestamp.toDate().toLocaleDateString('en-IN') : "Just now"; const imgSource = d.productPic || 'https://via.placeholder.com/50'; let buyerInfoHtml = ''; let contactBtnsHtml = ''; if(d.buyerName || d.buyerPhone) { let nameDisp = d.buyerName || 'Customer'; let phoneDisp = d.buyerPhone ? ` | ${d.buyerPhone}` : ''; let addrDisp = d.buyerAddress ? `<br><i class="fas fa-map-marker-alt" style="color:#94a3b8;"></i> ${d.buyerAddress}` : ''; buyerInfoHtml = `<div style="background:#f1f5f9; padding:8px 10px; border-radius:8px; margin-top:10px; font-size:11px; color:#475569; border:1px solid #e2e8f0;"><i class="fas fa-user-circle" style="color:#0ea5e9;"></i> <strong style="color:#1e293b;">${nameDisp}</strong>${phoneDisp}${addrDisp}</div>`; if(d.buyerPhone) { let rawPhone = d.buyerPhone.replace(/\D/g, ''); let waPhone = rawPhone.length === 10 ? '91' + rawPhone : rawPhone; contactBtnsHtml = `<div class="buyer-contact-btn"><a href="tel:${rawPhone}" class="btn-call"><i class="fas fa-phone"></i> Call</a><a href="sms:${rawPhone}" class="btn-sms"><i class="fas fa-comment-sms"></i> SMS</a><a href="https://wa.me/${waPhone}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> WA</a></div>`; } } container.innerHTML += `<div class="history-item" style="display:block;"><button class="btn-del-history" onclick="askDeleteHistory('${d.id}')" title="Request Admin to Delete"><i class="fas fa-trash"></i></button><div style="display:flex; justify-content:space-between; align-items:flex-start; padding-right: 35px;"><div class="history-item-left"><img src="${imgSource}" class="history-item-img"><div class="history-item-text"><h4>${d.productName}</h4><p><i class="far fa-calendar-alt"></i> ${date} &nbsp;|&nbsp; Qty: ${d.qty}</p></div></div><div class="history-item-right"><h3>₹${d.totalAmount}</h3></div></div>${buyerInfoHtml}${contactBtnsHtml}</div>`; }); }).catch(err => { container.innerHTML = `<div style="color:red; text-align:center; font-size:12px; padding:10px;">Error: ${err.message}</div>`; }); }
    </script>
