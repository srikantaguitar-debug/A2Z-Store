<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Panel | Business Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; color: #1e293b; padding-bottom: 50px; }
        
        /* Toast Notification */
        #customToast { visibility: hidden; min-width: 250px; text-align: center; border-radius: 10px; padding: 15px 20px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.3); opacity: 0; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; }
        #customToast.show { visibility: visible; opacity: 1; bottom: 50px; }
        .toast-error { background: #ef4444; } .toast-success { background: #10b981; } .toast-warning { background: #f59e0b; }

        /* Login Screen */
        #seller-login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1e293b, #0f172a); z-index: 2000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        /* Header */
        .header { background: #0f172a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .dynamic-logo { height: 35px; border-radius: 5px; display: none; object-fit: contain; background: white; padding: 2px;} 
        .btn-settings { background: transparent; color: white; border: none; font-size: 22px; cursor: pointer; transition: transform 0.3s; }

        /* Summary */
        .profile-summary { background: white; margin: 15px; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 5px solid #10b981; }
        .profile-summary img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
        .profile-sales { text-align: right; border-left: 1px dashed #cbd5e1; padding-left: 15px; cursor: pointer; }
        .profile-sales h2 { margin: 0; font-size: 20px; color: #0ea5e9; }

        /* Modals */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px);}
        .edit-card { background: white; width: 90%; max-width: 380px; max-height: 90vh; overflow-y: auto; border-radius: 20px; padding: 25px; text-align: left; }

        /* Settings Buttons */
        .settings-menu-btn { width: 100%; height: 55px; margin-bottom: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Poppins'; transition: 0.3s; box-sizing: border-box; border: 1px solid transparent;}
        .btn-menu-backup { background: #e0f2fe; color: #0284c7; border-color: #bae6fd; }
        .btn-menu-restore { background: #dcfce7; color: #16a34a; border-color: #bbf7d0; }
        .btn-menu-logout { background: #fee2e2; color: #dc2626; border-color: #fecaca; }

        /* Product & History UI */
        .product-item, .history-item { background: white; margin: 0 15px 12px; border-radius: 15px; border: 1px solid #e2e8f0; display: flex; align-items: center; padding: 15px; gap: 15px; position: relative; }
        .product-img, .history-item-img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; }
        .btn-del-history { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; position: absolute; right: 15px; top: 15px; display: flex; justify-content: center; align-items: center; }
        .img-preview-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-top: 10px; }
        .qty-controls { display: flex; align-items: center; gap: 8px; background: #f1f5f9; border-radius: 8px; padding: 4px 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="customToast"></div>

    <div id="seller-login-overlay">
        <div class="login-box">
            <h2>Seller Login</h2>
            <input type="tel" id="sellerPhone" placeholder="Phone Number" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
            <input type="date" id="sellerDob" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;">
            <button onclick="loginSeller()" style="width:100%; padding:14px; background:#f59e0b; color:white; border:none; border-radius:10px; font-weight:700;">Access Dashboard</button>
        </div>
    </div>

    <div id="main-seller-content" style="display: none;">
        <div class="header">
            <img id="headerLogo" src="" style="height:35px;">
            <button class="btn-settings" onclick="openSettingsModal()"><i class="fas fa-cog"></i></button>
        </div>

        <div class="profile-summary">
            <img id="dashboardProfilePic" src="https://via.placeholder.com/100">
            <div class="profile-info">
                <h3 id="dashboardStoreName">Store Name</h3>
                <p id="dashboardSellerName">Seller Name</p>
            </div>
            <div class="profile-sales" onclick="openHistoryModal()">
                <p style="font-size:10px; margin:0; font-weight:700;">TOTAL SALES</p>
                <h2 id="dashboardTotalSales">₹0</h2>
            </div>
        </div>

        <div style="padding: 15px;">
            <button onclick="openRecordSaleModal()" style="width:100%; padding:14px; background:#10b981; color:white; border:none; border-radius:12px; font-weight:700;"><i class="fas fa-cash-register"></i> Record New Sale</button>
        </div>

        <div style="background:white; margin:0 15px 15px; padding:15px; border-radius:15px; border-left:4px solid #f59e0b; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
            <h4 style="margin:0 0 15px;">Add New Product</h4>
            <input type="text" id="prodName" placeholder="Product Name" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #cbd5e1;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="number" id="prodMrp" placeholder="MRP" style="flex:1; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
                <input type="number" id="prodPrice" placeholder="Selling Price" style="flex:1; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
            </div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <select id="adminCommType" style="flex:1; padding:10px; border-radius:8px; border:1px solid #cbd5e1;"><option value="percent">% Commission</option><option value="flat">₹ Flat Fee</option></select>
                <input type="number" id="adminCommValue" placeholder="Value" style="flex:1; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
            </div>
            <input type="number" id="prodStock" placeholder="Total Stock" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #cbd5e1;">
            <div style="display:flex; gap:10px;">
                <label style="flex:1; background:#0ea5e9; color:white; text-align:center; padding:10px; border-radius:8px; cursor:pointer;"><i class="fas fa-camera"></i> Camera<input type="file" accept="image/*" capture="environment" onchange="addProdPicChosen(this)" style="display:none;"></label>
                <label style="flex:1; background:#f59e0b; color:white; text-align:center; padding:10px; border-radius:8px; cursor:pointer;"><i class="fas fa-images"></i> Gallery<input type="file" accept="image/*" multiple onchange="addProdPicChosen(this)" style="display:none;"></label>
            </div>
            <div id="add-prod-pic-preview" class="img-preview-container"></div>
            <button onclick="addProduct()" id="addProdBtn" style="width:100%; padding:14px; background:#f59e0b; color:white; border:none; border-radius:10px; font-weight:700; margin-top:10px;">Publish Product</button>
        </div>

        <h3 style="margin-left: 15px;">My Stock List</h3>
        <div id="products-container" style="padding-bottom: 20px;"></div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="edit-card" style="max-width:320px; text-align:center;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h3>Settings</h3><i class="fas fa-times" onclick="closeSettingsModal()" style="cursor:pointer;"></i></div>
            <button id="btnBackupUI" class="settings-menu-btn btn-menu-backup" onclick="requestAdminAction('backup')"><i class="fas fa-cloud-download-alt"></i> Request Backup</button>
            <button id="btnRestoreUI" class="settings-menu-btn btn-menu-restore" onclick="requestAdminAction('restore')"><i class="fas fa-cloud-upload-alt"></i> Request Restore</button>
            <input type="hidden" id="restoreReqId">
            <input type="file" id="restoreFileInput" accept=".json" style="display:none;" onchange="handleFileSelect(event)">
            <button class="settings-menu-btn btn-menu-logout" onclick="logoutSeller()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="edit-card" style="max-width: 450px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><h3>Sales History</h3><i class="fas fa-times" onclick="closeHistoryModal()" style="cursor:pointer;"></i></div>
            <select id="historyYear" onchange="fetchSalesHistory()" style="width:100%; padding:10px; border-radius:8px; margin-bottom:10px;">
                <option value="2026">2026</option><option value="2025">2025</option>
            </select>
            <div id="historyListContainer" style="max-height:450px; overflow-y:auto;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="recordSaleModal">
        <div class="edit-card">
            <h3 style="text-align:center;">Record Sale</h3>
            <input type="text" id="saleProductSearch" class="custom-select-input" placeholder="Search product..." oninput="handleSearchInput()" onclick="toggleSaleDropdown()" style="width:100%; box-sizing:border-box;">
            <div class="custom-dropdown" id="saleProductDropdown" style="width:100%;"></div>
            <input type="number" id="saleQty" value="1" min="1" oninput="calculateSaleTotal()" style="width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #cbd5e1; box-sizing:border-box;">
            <div style="background:#f1f5f9; padding:15px; border-radius:10px; margin-top:15px;">
                <input type="text" id="buyerName" placeholder="Buyer Name" style="width:100%; padding:8px; margin-bottom:8px; border-radius:5px; border:1px solid #ddd;">
                <input type="tel" id="buyerPhone" placeholder="Phone Number" style="width:100%; padding:8px; border-radius:5px; border:1px solid #ddd;">
            </div>
            <div style="text-align:center; margin-top:15px;"><p style="margin:0; font-size:12px;">Total Amount</p><h2 id="saleTotalAmount" style="margin:0; color:#10b981;">₹0</h2></div>
            <button id="confirmSaleBtn" onclick="saveRecordSale()" style="width:100%; padding:14px; background:#10b981; color:white; border:none; border-radius:12px; font-weight:700; margin-top:10px;">Confirm Sale</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCL4WsaX5utDOWw8V29m4Pyuliqyr81Qoo", authDomain: "a2z-store-58237.firebaseapp.com", projectId: "a2z-store-58237", storageBucket: "a2z-store-58237.firebasestorage.app", messagingSenderId: "489094614330", appId: "1:489094614330:web:adaa177f194b718f001403" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentSellerProducts = [];
        let selectedProd = null;
        let tempAddProdPics = [];

        window.onload = () => {
            const sid = localStorage.getItem("seller_id");
            if (sid) { loadSellerDashboard(sid); fetchMyProducts(sid); listenForApprovals(sid); fetchLogo(); calculateTotalSales(sid); }
        };

        function showToast(m, t='error'){ const x=document.getElementById('customToast'); x.innerHTML=m; x.className='toast-'+t; x.classList.add('show'); setTimeout(()=>x.classList.remove('show'), 3000); }

        async function requestAdminAction(type, extraData = null) {
            const sid = localStorage.getItem("seller_id");
            const sName = localStorage.getItem("seller_name");
            showToast("Request sent to Admin. Please wait.", "warning");
            await db.collection("AdminRequests").add({
                sellerId: sid, sellerName: sName, actionType: type, status: "pending", extraData: extraData, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function listenForApprovals(sid) {
            db.collection("AdminRequests").where("sellerId", "==", sid).onSnapshot(snap => {
                let hasBackupApp = null; let hasRestoreApp = null;
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === "approved") {
                        if(d.actionType === 'backup') hasBackupApp = doc.id;
                        if(d.actionType === 'restore') hasRestoreApp = doc.id;
                        if(d.actionType === 'delete_history') executeDeleteHistory(d.extraData.historyId, doc.id);
                    }
                });

                const btnB = document.getElementById('btnBackupUI');
                if(hasBackupApp) {
                    btnB.innerHTML = `<i class="fas fa-check-circle"></i> Download Backup Now`;
                    btnB.style.background = "#10b981"; btnB.style.color = "white";
                    btnB.onclick = () => performBackup(hasBackupApp);
                } else {
                    btnB.innerHTML = `<i class="fas fa-cloud-download-alt"></i> Request Backup Data`;
                    btnB.style.background = "#e0f2fe"; btnB.style.color = "#0369a1";
                    btnB.onclick = () => requestAdminAction('backup');
                }

                const btnR = document.getElementById('btnRestoreUI');
                if(hasRestoreApp) {
                    btnR.innerHTML = `<i class="fas fa-check-circle"></i> Upload & Restore Now`;
                    btnR.style.background = "#10b981"; btnR.style.color = "white";
                    btnR.onclick = () => { document.getElementById('restoreReqId').value = hasRestoreApp; document.getElementById('restoreFileInput').click(); };
                } else {
                    btnR.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Request Restore Data`;
                    btnR.style.background = "#dcfce7"; btnR.style.color = "#15803d";
                    btnR.onclick = () => requestAdminAction('restore');
                }
            });
        }

        async function executeDeleteHistory(historyId, reqId) {
            try {
                const historyRef = db.collection("SalesHistory").doc(historyId);
                const doc = await historyRef.get();
                if(doc.exists) {
                    const d = doc.data();
                    // Restore stock
                    await db.collection("Products").doc(d.productId).update({
                        stockCount: firebase.firestore.FieldValue.increment(d.qty),
                        soldCount: firebase.firestore.FieldValue.increment(-d.qty)
                    });
                }
                await historyRef.delete();
                await db.collection("AdminRequests").doc(reqId).delete();
                showToast("Sale Record Deleted & Stock Restored!", "success");
                fetchSalesHistory();
            } catch(e) { console.error(e); }
        }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const sid = localStorage.getItem("seller_id");
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = JSON.parse(e.target.result);
                // Handle product extraction logic
                if(data.records) {
                    const unique = new Map();
                    data.records.forEach(r => {
                        if(r.cart) r.cart.forEach(item => {
                            if(!unique.has(item.name)) {
                                unique.set(item.name, {
                                    sellerId: sid, productName: item.name, price: item.price, stockCount: 50, soldCount: 0,
                                    productPic: `https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random&color=fff`,
                                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                                });
                            }
                        });
                    });
                    for(let p of unique.values()) await db.collection("Products").add(p);
                    showToast("Products Restored!", "success");
                }
                const reqId = document.getElementById('restoreReqId').value;
                if(reqId) await db.collection("AdminRequests").doc(reqId).delete();
                closeSettingsModal();
            };
            reader.readAsText(file);
        }

        // Multiple Images Logic
        async function addProdPicChosen(input) {
            if(input.files) {
                for(let file of input.files) {
                    const base64 = await processImage(file, 400);
                    tempAddProdPics.push(base64);
                }
                renderPreview();
            }
        }
        function renderPreview() {
            const cont = document.getElementById('add-prod-pic-preview'); cont.innerHTML = "";
            tempAddProdPics.forEach((p, i) => {
                cont.innerHTML += `<div style="position:relative;"><img src="${p}" style="width:50px;height:50px;border-radius:5px;"><span onclick="tempAddProdPics.splice(${i},1);renderPreview();" style="position:absolute;top:-5px;right:-5px;background:red;color:white;border-radius:50%;width:15px;height:15px;display:flex;justify-content:center;align-items:center;font-size:10px;cursor:pointer;">✕</span></div>`;
            });
        }

        async function addProduct() {
            const sid = localStorage.getItem("seller_id");
            const pName = document.getElementById('prodName').value;
            const pPrice = Number(document.getElementById('prodPrice').value);
            const pStock = Number(document.getElementById('prodStock').value);
            if(!pName || !pPrice || tempAddProdPics.length === 0) return showToast("Fill all fields and add image.");
            
            await db.collection("Products").add({
                sellerId: sid, productName: pName, price: pPrice, stockCount: pStock, soldCount: 0,
                productPics: tempAddProdPics, productPic: tempAddProdPics[0],
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast("Product Added!", "success");
            tempAddProdPics = []; renderPreview();
        }

        function calculateTotalSales(sid) {
            db.collection("SalesHistory").where("sellerId", "==", sid).onSnapshot(snap => {
                let total = 0;
                snap.forEach(doc => total += (doc.data().totalAmount || 0));
                document.getElementById('dashboardTotalSales').innerText = "₹" + total;
            });
        }

        function fetchMyProducts(sid) {
            db.collection("Products").where("sellerId", "==", sid).onSnapshot(snap => {
                const cont = document.getElementById('products-container'); cont.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    cont.innerHTML += `<div class="product-item">
                        <img src="${d.productPic}" class="product-img">
                        <div style="flex:1;"><h4>${d.productName}</h4><p>₹${d.price} | Stock: ${d.stockCount}</p></div>
                        <button onclick="deleteProduct('${doc.id}')" style="background:#fee2e2; border:none; color:#ef4444; padding:8px; border-radius:8px;"><i class="fas fa-trash"></i></button>
                    </div>`;
                });
            });
        }

        async function deleteProduct(id) {
            if(confirm("Delete this product?")) {
                await db.collection("Products").doc(id).delete();
                showToast("Product Deleted", "success");
            }
        }

        function fetchSalesHistory() {
            const sid = localStorage.getItem("seller_id");
            const year = document.getElementById('historyYear').value;
            db.collection("SalesHistory").where("sellerId", "==", sid).where("year", "==", year).onSnapshot(snap => {
                const cont = document.getElementById('historyListContainer'); cont.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    cont.innerHTML += `<div class="history-item">
                        <img src="${d.productPic}" style="width:40px;height:40px;border-radius:5px;">
                        <div style="flex:1;"><h4>${d.productName}</h4><p>₹${d.totalAmount} | Qty: ${d.qty}</p></div>
                        <button class="btn-del-history" onclick="requestAdminAction('delete_history', {historyId: '${doc.id}'})"><i class="fas fa-trash"></i></button>
                    </div>`;
                });
            });
        }

        // Basic Helpers
        function processImage(file, width = 300) { return new Promise(resolve => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = () => { const canvas = document.createElement('canvas'); const scale = width / img.width; canvas.width = width; canvas.height = img.height * scale; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); resolve(canvas.toDataURL('image/jpeg', 0.5)); }; }; }); }
        function loadSellerDashboard(sid) { document.getElementById('seller-login-overlay').style.display = 'none'; document.getElementById('main-seller-content').style.display = 'block'; document.getElementById('dashboardStoreName').innerText = localStorage.getItem("seller_store"); document.getElementById('dashboardSellerName').innerText = localStorage.getItem("seller_name"); }
        function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettingsModal() { document.getElementById('settingsModal').style.display = 'none'; }
        function openHistoryModal() { document.getElementById('historyModal').style.display = 'flex'; fetchSalesHistory(); }
        function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }
        function logoutSeller() { localStorage.clear(); location.reload(); }
        function openRecordSaleModal() { document.getElementById('recordSaleModal').style.display = 'flex'; }
        function closeRecordSaleModal() { document.getElementById('recordSaleModal').style.display = 'none'; }
        function fetchLogo() { db.collection("Settings").doc("StoreConfig").onSnapshot(d => { if(d.exists) document.getElementById('headerLogo').src = d.data().logoUrl; }); }

        async function loginSeller() {
            const ph = document.getElementById('sellerPhone').value;
            const dob = document.getElementById('sellerDob').value;
            const snap = await db.collection("Sellers").where("phone", "==", ph).get();
            if(!snap.empty) {
                snap.forEach(doc => {
                    if(doc.data().dob === dob) {
                        localStorage.setItem("seller_id", doc.id);
                        localStorage.setItem("seller_name", doc.data().sellerName);
                        localStorage.setItem("seller_store", doc.data().storeName);
                        location.reload();
                    }
                });
            } else { showToast("User not found"); }
        }
    </script>
</body>
</html>
